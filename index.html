    'marker26': { name: '合成器',     model: 'runtime:synth-workstation',            audio: '', markdown: 'assets/markdown/synth_workstation.md', info: 'assets/info/synth_workstation.txt', isLoaded: false, playSounds: ['C4', 'E4', 'G4', 'C5'] },
    'marker27': { name: '鼓机',       model: 'runtime:drum-machine',                 audio: '', markdown: 'assets/markdown/drum_machine.md',      info: 'assets/info/drum_machine.txt',      isLoaded: false, playSounds: ['C3', 'D3', 'G3'] },
    'marker28': { name: '葫芦丝',     model: 'assets/models/hulusi.gltf',            audio: 'assets/audio/audio-hulusi.mp3', markdown: 'assets/markdown/hulusi.md', info: 'assets/info/hulusi.txt', isLoaded: false, interactiveHulusi: true, playSounds: ['G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'G5'] }
};

// 工具函数
function getDeviceInfo() {
    const ua = navigator.userAgent;
    return {
        isIOS: /iPhone|iPad|iPod/i.test(ua),
        isWeChat: /MicroMessenger/i.test(ua),
        isAndroid: /Android/i.test(ua),
        isDesktop: !/iPhone|iPad|iPod|Android/i.test(ua)
    };
}

// ====================================================================
// 新增：权限检测相关函数
// ====================================================================

// 检查摄像头权限状态
async function checkCameraPermission() {
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.warn('getUserMedia not supported');
            return 'unsupported';
        }

        // 尝试获取摄像头流
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment' }
        });
        
        // 如果成功获取，立即关闭流并返回granted
        stream.getTracks().forEach(track => track.stop());
        return 'granted';
        
    } catch (error) {
        console.log('Camera permission check failed:', error.name, error.message);
        
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
            return 'denied';
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
            return 'no-camera';
        } else {
            return 'error';
        }
    }
}

// 显示权限错误弹窗
function showPermissionErrorOverlay() {
    // 检查是否已经存在弹窗
    if (document.getElementById('permission-error-overlay')) {
        return;
    }

    const device = getDeviceInfo();
    
    const overlay = document.createElement('div');
    overlay.id = 'permission-error-overlay';
    overlay.className = 'permission-error-overlay';
    
    overlay.innerHTML = `
        <div class="permission-error-panel">
            <div class="permission-error-title">📷 摄像头权限被拒绝</div>
            <div class="permission-error-text">
                AR功能需要使用摄像头来识别乐器码。<br>
                请按照以下步骤重新授权：<br>
                1.手动点击右上角菜单点击“刷新”。<br>
                2.如果看到权限请求弹窗出现，请点击“允许”或“Allow”按钮。
            </div>
            <div class="permission-error-text">
                如果手动刷新网页后仍然没有看到权限请求弹窗，请尝试以下方法：<br>
                1.重新扫描二维码进入该页面，在弹出的权限请求弹窗中点击“允许”或“Allow”按钮。<br>
            </div>
            <div class="permission-error-buttons">
                <button class="permission-error-btn primary" onclick="refreshPage()">
                    🔃 刷新页面<br>如刷新后没有看到权限请求弹窗<br>请重新扫码进入
                </button>
            </div>
        </div>
    `;
    
    document.body.appendChild(overlay);
    console.log('Permission error overlay shown');
}

// 隐藏权限错误弹窗
function hidePermissionErrorOverlay() {
    const overlay = document.getElementById('permission-error-overlay');
    if (overlay) {
        overlay.remove();
    }
}

// 监听AR.js场景错误
function setupARSceneErrorHandling() {
    if (HULUSI_DEBUG_MODE) return;
    const arScene = document.getElementById('ar-scene');
    if (!arScene) return;

    // 监听A-Frame的错误事件
    arScene.addEventListener('ar-error', function(event) {
        console.error('AR Error:', event.detail);
        handleARError(event.detail);
    });

    // 监听A-Frame场景的加载错误
    arScene.addEventListener('loaded', function() {
        console.log('AR scene loaded successfully');
        clearTimeout(permissionCheckTimeout);
    });

    // 设置超时检测，如果AR场景在一定时间内没有正常启动，可能是权限问题
    arScene.addEventListener('renderstart', function() {
        console.log('AR rendering started');
        clearTimeout(permissionCheckTimeout);
    });
}

// 处理AR错误
function handleARError(error) {
    if (HULUSI_DEBUG_MODE) return;
    console.error('Handling AR error:', error);
    
    // 检查是否是权限相关的错误
    if (error && (
        error.message && error.message.includes('Permission') ||
        error.name === 'NotAllowedError' ||
        error.toString().includes('permission')
    )) {
        setTimeout(() => {
            showPermissionErrorOverlay();
        }, 500);
    }
}

// ====================================================================
// 新增：带重试机制的通用 Fetch 函数
// ====================================================================
async function fetchWithRetry(url, maxRetries = 3, retryDelay = 1000, resourceName = '资源') {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response; // 成功时返回 response 对象
        } catch (error) {
            console.warn(`${resourceName} fetch attempt ${attempt} failed:`, error.message);
            if (attempt === maxRetries) {
                console.error(`All ${maxRetries} fetch attempts for ${resourceName} failed.`);
                throw error; // 重试次数用尽，抛出最终错误
            }
            // 每次重试前都短暂提示
            showNotification(`${resourceName}加载失败，第 ${attempt} 次重试中...`, true);
            // 等待一段时间再重试，可以采用递增延迟
            await new Promise(resolve => setTimeout(resolve, retryDelay * attempt));
        }
    }
}

    const list = Array.isArray(lines) ? lines : [lines];

function getRuntimeCanvasRect(sceneEl) {
    const canvas = sceneEl && (sceneEl.canvas || (sceneEl.renderer && sceneEl.renderer.domElement));
    const rect = canvas && canvas.getBoundingClientRect();
    if (rect && rect.width > 0 && rect.height > 0) {
        return rect;
    }
    return {
        left: 0,
        top: 0,
        width: window.innerWidth || document.documentElement.clientWidth || 1,
        height: window.innerHeight || document.documentElement.clientHeight || 1
    };
}

function prepareRuntimeCameraForRaycast(camera) {
    if (!camera) return false;
    if (!camera.isPerspectiveCamera && !camera.isOrthographicCamera) {
        camera.isPerspectiveCamera = true;
    }
    if (!camera.projectionMatrixInverse && typeof THREE !== 'undefined' && THREE.Matrix4) {
        camera.projectionMatrixInverse = new THREE.Matrix4();
    }
    if (camera.projectionMatrix && camera.projectionMatrixInverse && camera.projectionMatrixInverse.copy) {
        camera.projectionMatrixInverse.copy(camera.projectionMatrix).invert();
    }
    camera.updateMatrixWorld(true);
    return Boolean(camera.isPerspectiveCamera || camera.isOrthographicCamera);
}

function setRuntimeRaycasterFromEvent(raycaster, mouse, sceneEl, camera, evt) {
    const pointer = getRuntimeEventPointer(evt);
    const canvasRect = getRuntimeCanvasRect(sceneEl);
    mouse.x = ((pointer.x - canvasRect.left) / canvasRect.width) * 2 - 1;
    mouse.y = -((pointer.y - canvasRect.top) / canvasRect.height) * 2 + 1;
    sceneEl.object3D.updateMatrixWorld(true);
    prepareRuntimeCameraForRaycast(camera);
    raycaster.setFromCamera(mouse, camera);
    return { pointer, canvasRect };
}

function getRuntimeInteractionObject(object) {
    let current = object;
    while (current) {
        if (current.userData && current.userData.interaction) {
            return current;
        }
        current = current.parent;
    }
    return null;
}

function getRuntimeRaycastHit(raycaster, interactives) {
    const hits = raycaster.intersectObjects(interactives, true);
    for (let i = 0; i < hits.length; i++) {
        const object = getRuntimeInteractionObject(hits[i].object);
        if (object) {
            return { object, interaction: object.userData.interaction, point: hits[i].point };
        }
    }
    return null;
}

function isRuntimeObjectVisible(object) {
    let current = object;
    while (current) {
        if (current.visible === false) return false;
        current = current.parent;
    }
    return true;
}

function getRuntimeObjectScreenBox(object, camera, canvasRect) {
    if (!object || !object.geometry || !isRuntimeObjectVisible(object)) return null;
    if (!object.geometry.boundingBox) {
        object.geometry.computeBoundingBox();
    }
    const box = object.geometry.boundingBox;
    if (!box) return null;

    object.updateWorldMatrix(true, false);
    const corners = [
        new THREE.Vector3(box.min.x, box.min.y, box.min.z),
        new THREE.Vector3(box.min.x, box.min.y, box.max.z),
        new THREE.Vector3(box.min.x, box.max.y, box.min.z),
        new THREE.Vector3(box.min.x, box.max.y, box.max.z),
        new THREE.Vector3(box.max.x, box.min.y, box.min.z),
        new THREE.Vector3(box.max.x, box.min.y, box.max.z),
        new THREE.Vector3(box.max.x, box.max.y, box.min.z),
        new THREE.Vector3(box.max.x, box.max.y, box.max.z)
    ];

    let left = Infinity;
    let right = -Infinity;
    let top = Infinity;
    let bottom = -Infinity;
    let minZ = Infinity;
    let maxZ = -Infinity;

    for (const corner of corners) {
        corner.applyMatrix4(object.matrixWorld).project(camera);
        if (!Number.isFinite(corner.x) || !Number.isFinite(corner.y) || !Number.isFinite(corner.z)) {
            return null;
        }
        const x = canvasRect.left + (corner.x + 1) * 0.5 * canvasRect.width;
        const y = canvasRect.top + (1 - corner.y) * 0.5 * canvasRect.height;
        left = Math.min(left, x);
        right = Math.max(right, x);
        top = Math.min(top, y);
        bottom = Math.max(bottom, y);
        minZ = Math.min(minZ, corner.z);
        maxZ = Math.max(maxZ, corner.z);
    }

    if (maxZ < -1 || minZ > 1) return null;
    return {
        left,
        right,
        top,
        bottom,
        centerX: (left + right) / 2,
        centerY: (top + bottom) / 2,
        area: Math.max(1, (right - left) * (bottom - top))
    };
}

function isPointerInsideRuntimeBox(pointer, box, padding = runtimeTouchHitPadding) {
    return pointer.x >= box.left - padding &&
        pointer.x <= box.right + padding &&
        pointer.y >= box.top - padding &&
        pointer.y <= box.bottom + padding;
}

function findRuntimeScreenSpaceHit(interactives, camera, canvasRect, pointer, padding = runtimeTouchHitPadding) {
    let best = null;
    for (const object of interactives) {
        const box = getRuntimeObjectScreenBox(object, camera, canvasRect);
        if (!box || !isPointerInsideRuntimeBox(pointer, box, padding)) continue;
        const dx = pointer.x - box.centerX;
        const dy = pointer.y - box.centerY;
        const score = Math.sqrt(dx * dx + dy * dy) + box.area * 0.0005;
        if (!best || score < best.score) {
            best = { object, interaction: object.userData.interaction, point: null, score };
        }
    }
    return best ? { object: best.object, interaction: best.interaction, point: best.point } : null;
}

function ensureAudio() {
    if (audioCtx) return audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) {
        showNotification('当前浏览器不支持 Web Audio', true);
        return null;
    }

    audioCtx = new Ctx({ latencyHint: "interactive" });
    if (navigator.audioSession) {
        try { navigator.audioSession.type = "playback"; } catch (err) {}
    }

    masterGain = audioCtx.createGain();
    masterGain.gain.value = state.faders.VOL;

    const compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 22;
    compressor.ratio.value = 5;
    compressor.attack.value = 0.006;
    compressor.release.value = 0.18;
    masterGain.connect(compressor);
    compressor.connect(audioCtx.destination);

    fxSend = audioCtx.createGain();
    fxSend.gain.value = state.faders.FX * 0.34;
    delayNode = audioCtx.createDelay(0.9);
    delayNode.delayTime.value = 0.22;
    delayFeedback = audioCtx.createGain();
    delayFeedback.gain.value = 0.18;
    fxSend.connect(delayNode);
    delayNode.connect(delayFeedback);
    delayFeedback.connect(delayNode);
    delayNode.connect(compressor);

    guitarReverbSend = audioCtx.createGain();
    guitarReverbConvolver = audioCtx.createConvolver();
    guitarReverbGain = audioCtx.createGain();
    guitarReverbConvolver.buffer = createImpulseResponse(audioCtx, 1.45, 2.4);
    guitarReverbGain.gain.value = getOriginalGuitarParams().reverb * 0.36;
    guitarReverbSend.connect(guitarReverbConvolver);
    guitarReverbConvolver.connect(guitarReverbGain);
    guitarReverbGain.connect(masterGain);
    queueGuite222GuitarWorkletLoad();

    // 葫芦丝 PeriodicWave
    if (!hulusiPeriodicWave && audioCtx.createPeriodicWave) {
        try {
            hulusiPeriodicWave = audioCtx.createPeriodicWave(
                new Float32Array(HULUSI_HARMONICS.real),
                new Float32Array(HULUSI_HARMONICS.imag),
                { disableNormalization: false }
            );
        } catch (e) { hulusiPeriodicWave = null; }
    }

    return audioCtx;
}

function createImpulseResponse(ctx, duration, decay) {
    const len = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const buffer = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let channel = 0; channel < 2; channel++) {
        const data = buffer.getChannelData(channel);
        for (let i = 0; i < len; i++) {
            const t = i / len;
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, decay) * 0.35;
        }
    }
    return buffer;
}

function unlockAudio() {
    const ctx = ensureAudio();
    if (!ctx) return;
    try {
        if (ctx.state === "suspended") {
            ctx.resume().catch(() => showNotification('请再次点击启动声音', true));
        }
        if (audioUnlocked) return;
        const buffer = ctx.createBuffer(1, 1, ctx.sampleRate);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        audioUnlocked = true;
    } catch (err) {}
}

async function unlockSynthAudio() {
    unlockAudio();
    if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume().catch(() => {});
    return Boolean(audioCtx);
}

function resetAudioForPreset(id) {
    const ctx = ensureAudio();
    if (!ctx) return;
    if (ctx.state === "suspended") ctx.resume().catch(() => {});
    cancelActiveControlPointers();
    state.lastFreq = null;
    const now = ctx.currentTime;
    masterGain?.gain.cancelScheduledValues(now);
    masterGain?.gain.setTargetAtTime(state.faders.VOL, now, 0.015);
    fxSend?.gain.cancelScheduledValues(now);
    fxSend?.gain.setTargetAtTime(state.faders.FX * 0.34, now, 0.015);
    if (guitarReverbGain) {
        const reverb = id === "GUITAR" ? getOriginalGuitarParams().reverb * 0.36 : 0;
        guitarReverbGain.gain.cancelScheduledValues(now);
        guitarReverbGain.gain.setTargetAtTime(reverb, now, 0.02);
    }
}

function midiToFrequency(midi) {
    return 440 * Math.pow(2, (midi - 69 + state.pitchBend * 2) / 12);
}

function getAdsr() {
    return {
        attack: 0.004 + state.faders.A * 0.72,
        decay: 0.035 + state.faders.D * 0.9,
        sustain: clampRuntimeValue(state.faders.S, 0.08, 0.92),
        release: 0.04 + state.faders.R * 1.8
    };
}

function makeNoiseBuffer(ctx, duration = 0.7) {
    const length = Math.max(1, Math.floor(ctx.sampleRate * duration));
    const buffer = ctx.createBuffer(1, length, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < length; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    return buffer;
}

function applyVoiceEnvelope(gain, velocity, sustainMultiplier = 1) {
    const ctx = audioCtx;
    const adsr = getAdsr();
    const now = ctx.currentTime;
    const peak = clampRuntimeValue(velocity * state.faders.VOL, 0.001, 0.95);
    gain.gain.cancelScheduledValues(now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(peak, now + adsr.attack);
    gain.gain.setTargetAtTime(peak * adsr.sustain * sustainMultiplier, now + adsr.attack, adsr.decay / 3);
}

function routeVoice(source, filter, gain) {
    source.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);
    gain.connect(fxSend);
}

function createSynthVoice(midi, velocity = 0.78, options = {}) {
    const ctx = ensureAudio();
    if (!ctx) return null;
    if (ctx.state === "suspended") ctx.resume().catch(() => {});

    const now = ctx.currentTime;
    const freq = midiToFrequency(midi + (options.bass ? -12 : 0));
    const wave = options.wave || WAVES[state.currentWave].osc;
    const filter = ctx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 180 + Math.pow(state.cutoff, 1.4) * (options.bass ? 3600 : 11800);
    filter.Q.value = 0.7 + state.reso * 12;

    const gain = ctx.createGain();
    gain.gain.value = 0.0001;

    const isHulusi = (wave === "hulusi");
    let source;
    let oscillator = null;
    let noiseSource = null;
    let noiseGain = null;
    if (wave === "noise") {
        source = ctx.createBufferSource();
        source.buffer = makeNoiseBuffer(ctx, 1.4);
    } else {
        source = ctx.createOscillator();
        oscillator = source;
        if (isHulusi && hulusiPeriodicWave) {
            source.setPeriodicWave(hulusiPeriodicWave);
        } else {
            source.type = wave;
        }
        if (state.glide && state.lastFreq) {
            source.frequency.setValueAtTime(state.lastFreq, now);
            source.frequency.exponentialRampToValueAtTime(Math.max(20, freq), now + 0.11);
        } else {
            source.frequency.value = freq;
        }
        source.detune.value = state.pitchBend * 200;
        if (state.mod > 0.02) {
            const lfo = ctx.createOscillator();
            const lfoGain = ctx.createGain();
            lfo.frequency.value = 4.5 + state.mod * 5;
            lfoGain.gain.value = state.mod * (options.bass ? 10 : 24);
            lfo.connect(lfoGain);
            lfoGain.connect(source.detune);
            lfo.start(now);
            window.setTimeout(() => {
                try { lfo.stop(); lfo.disconnect(); lfoGain.disconnect(); } catch (err) {}
            }, 2600);
        }
    }

    applyVoiceEnvelope(gain, velocity, options.bass ? 0.8 : 1);

    if (isHulusi) {
        // 葫芦丝: bandpass 模拟簧片共鸣腔 + 轻微气息噪声
        filter.type = "bandpass";
        filter.Q.value = 1.2 + state.reso * 5;
        // 气息噪声
        noiseSource = ctx.createBufferSource();
        noiseSource.buffer = makeNoiseBuffer(ctx, 2.5);
        noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(0.0001, now);
        noiseGain.gain.linearRampToValueAtTime(velocity * 0.04, now + 0.06);
        noiseGain.gain.setTargetAtTime(0.0001, now + 0.15, 0.4);
        noiseSource.connect(noiseGain);
        noiseGain.connect(filter);
        noiseSource.start(now);
        noiseSource.stop(now + 3.0);
    }

    routeVoice(source, filter, gain);
    source.start(now);

    const voice = {
        source,
        oscillator,
        gain,
        filter,
        noiseSource,
        noiseGain,
        startedAt: now,
        minHoldUntil: now + ((options.bass ? MIN_BASS_NOTE_HOLD_MS : MIN_SYNTH_NOTE_HOLD_MS) / 1000),
        released: false,
        releaseTimer: 0
    };
    state.lastFreq = freq;
    return voice;
}

function noteNameToMidi(note = "C4") {
    if (typeof note === "number" && Number.isFinite(note)) return note;
    const match = String(note).trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
    if (!match) return 60;
    const base = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 }[match[1].toUpperCase()];
    const accidental = match[2] === "#" ? 1 : match[2] === "b" ? -1 : 0;
    const octave = Number(match[3]);
    return (octave + 1) * 12 + base + accidental;
}

function releaseVoice(voice, options = {}) {
    if (!voice || !audioCtx || voice.released) return;
    const now = audioCtx.currentTime;
    const wait = options.force ? 0 : Math.max(0, (voice.minHoldUntil || now) - now);
    if (wait <= 0.005) {
        noteOff(voice, options);
        return;
    }
    if (voice.releaseTimer) return;
    voice.releaseTimer = window.setTimeout(() => {
        voice.releaseTimer = 0;
        noteOff(voice, options);
    }, wait * 1000);
}

function noteOff(voice, options = {}) {
    if (!voice || !audioCtx) return;
    if (voice.released) return;
    voice.released = true;
    if (voice.releaseTimer) {
        window.clearTimeout(voice.releaseTimer);
        voice.releaseTimer = 0;
    }
    const adsr = getAdsr();
    const now = audioCtx.currentTime;
    const release = options.force ? 0.035 : (state.hold ? Math.max(adsr.release, 1.0) : adsr.release);
    try {
        voice.gain.gain.cancelScheduledValues(now);
        voice.gain.gain.setTargetAtTime(0.0001, now, release / 4);
        voice.source.stop(now + release + 0.08);
    } catch (err) {}
    window.setTimeout(() => {
        try {
            voice.source.disconnect();
            voice.filter.disconnect();
            voice.gain.disconnect();
        } catch (err) {}
    }, (release + 0.2) * 1000);
}

function createPluckVoice(midi, velocity = 0.78) {
    playGuite222GuitarNote(midi, velocity);
    return null;
}

function queueGuite222GuitarWorkletLoad() {
    if (!audioCtx || guite222GuitarNode || guite222GuitarReady || guite222GuitarFailed) return guite222GuitarReady;
    if (!audioCtx.audioWorklet || typeof AudioWorkletNode === "undefined") {
        guite222GuitarFailed = true;
        return null;
    }

    guite222GuitarReady = audioCtx.audioWorklet
        .addModule(GUITE222_GUITAR_WORKLET_URL.href)
        .then(() => {
            guite222GuitarNode = new AudioWorkletNode(audioCtx, "guitar-processor");
            guite222GuitarNode.connect(masterGain);
            return guite222GuitarNode;
        })
        .catch((err) => {
            guite222GuitarFailed = true;
            console.warn("guite222 guitar worklet failed", err);
            return null;
        });

    return guite222GuitarReady;
}

function playGuite222GuitarNote(midi, velocity = 0.85) {
    const ctx = ensureAudio();
    if (!ctx) return;
    if (ctx.state === "suspended") ctx.resume().catch(() => {});

    const freq = guite222FrequencyForMidi(midi);
    const message = {
        type: "pluck",
        freq,
        velocity: 0.85,
        params: getGuite222GuitarParams()
    };

    if (guite222GuitarNode) {
        guite222GuitarNode.port.postMessage(message);
        return;
    }

    const ready = queueGuite222GuitarWorkletLoad();
    if (ready) {
        ready.then((node) => {
            if (node) node.port.postMessage(message);
            else playGuite222FallbackNote(freq, velocity);
        });
        return;
    }

    playGuite222FallbackNote(freq, velocity);
}

function getGuite222GuitarParams() {
    return { ...GUITE222_GUITAR_PARAMS };
}

function guite222FrequencyForMidi(midi) {
    return GUITE222_BASE_FREQ * Math.pow(2, (midi - GUITE222_BASE_MIDI) / 12);
}

function playGuite222FallbackNote(freq, velocity = 0.85) {
    const ctx = ensureAudio();
    if (!ctx || !freq) return;
    const params = getGuite222GuitarParams();
    const buffer = synthesizeGuite222FallbackBuffer(ctx, freq, velocity, params);
    const source = ctx.createBufferSource();
    const gain = ctx.createGain();
    const now = ctx.currentTime;
    source.buffer = buffer;
    gain.gain.value = 0.9;
    source.connect(gain);
    gain.connect(masterGain);
    source.start(now);
    source.stop(now + buffer.duration);
}

function synthesizeGuite222FallbackBuffer(ctx, freq, velocity, params) {
    const sampleRate = ctx.sampleRate;
    const size = clampRuntimeValue(Math.round(sampleRate / freq), 8, 2400);
    const duration = 3.5;
    const length = Math.max(size + 2, Math.floor(sampleRate * duration));
    const buffer = ctx.createBuffer(1, length, sampleRate);
    const out = buffer.getChannelData(0);
    const delay = new Float32Array(size);

    for (let i = 0; i < size; i++) {
        let n = (Math.random() * 2 - 1) * velocity;
        if (i > 1) n = delay[i - 2] * 0.15 + delay[i - 1] * 0.55 + n * 0.30;
        delay[i] = n;
    }

    let pos = 0;
    let amp = 0;
    let phase = "attack";
    let lp1 = 0;
    const dt = 1 / sampleRate;
    for (let i = 0; i < length; i++) {
        let env = 0;
        if (phase === "attack") {
            amp += dt / params.attack;
            if (amp >= 1) {
                amp = 1;
                phase = "decay";
            }
            env = amp;
        } else if (phase === "decay") {
            amp -= dt / params.decay * (1 - params.sustain);
            if (amp <= params.sustain) {
                amp = params.sustain;
                phase = "sustain";
            }
            env = amp;
        } else {
            env = params.sustain;
        }

        const next = (pos + 1) % size;
        let ks = (delay[pos] + delay[next]) * 0.5 * params.brightness;
        lp1 += params.cutoff * (ks - lp1);
        delay[pos] = lp1;
        pos = next;
        out[i] = Math.tanh(lp1 * env * 0.45);
    }

    return buffer;
}

function playOriginalGuitarNote(midi, velocity = 0.78) {
    const ctx = ensureAudio();
    if (!ctx) return null;
    if (ctx.state === "suspended") ctx.resume().catch(() => {});
    const freq = midiToFrequency(midi);
    const params = getOriginalGuitarParams();
    const buffer = synthesizeOriginalGuitarBuffer(ctx, freq, velocity, params);
    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = clampRuntimeValue(900 + params.cutoff * 5200 + params.body * 700, 650, 7600);
    filter.Q.value = 0.65 + params.body * 1.1;

    const gain = ctx.createGain();
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const now = ctx.currentTime;
    const release = Math.max(0.08, params.release * 0.32);
    const peak = clampRuntimeValue(velocity, 0.05, 0.95);

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.001, peak), now + Math.max(0.002, params.attack));
    gain.gain.setTargetAtTime(peak * params.sustain, now + params.attack + params.decay, Math.max(0.025, params.decay));
    gain.gain.setTargetAtTime(0.0001, now + 0.22 + params.decay, release);

    const lane = guitarLaneForMidi(midi);
    if (pan) pan.pan.value = (lane - 2.5) / 4.2;

    source.connect(filter);
    if (pan) {
        filter.connect(pan);
        pan.connect(gain);
    } else {
        filter.connect(gain);
    }
    gain.connect(masterGain);
    if (guitarReverbSend) gain.connect(guitarReverbSend);
    if (guitarReverbGain) guitarReverbGain.gain.setTargetAtTime(params.reverb * 0.36, now, 0.03);

    source.start(now);
    source.stop(now + buffer.duration + 0.05);
    source.onended = () => {
        try {
            source.disconnect();
            filter.disconnect();
            gain.disconnect();
            pan?.disconnect();
        } catch (err) {}
    };

    const chorusAmount = params.chorus + (state.mod > 0.02 ? state.mod * 0.10 : 0);
    if (chorusAmount > 0.03) {
        window.setTimeout(() => {
            const detune = Math.pow(2, ((Math.random() > 0.5 ? 7 : -7) * chorusAmount) / 1200);
            playOriginalGuitarGhost(freq * detune, velocity * chorusAmount * 0.32, lane);
        }, 16);
    }

    return null;
}

function playOriginalGuitarGhost(freq, velocity, lane) {
    const ctx = ensureAudio();
    if (!ctx || !freq) return;
    const params = getOriginalGuitarParams();
    const buffer = synthesizeOriginalGuitarBuffer(ctx, freq, velocity, params, { short: true });
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const gain = ctx.createGain();
    const pan = ctx.createStereoPanner ? ctx.createStereoPanner() : null;
    const now = ctx.currentTime;

    gain.gain.setValueAtTime(clampRuntimeValue(velocity, 0.001, 0.45), now);
    gain.gain.setTargetAtTime(0.0001, now + 0.05, 0.22);
    if (pan) pan.pan.value = (lane - 2.5) / 3.6;

    if (pan) {
        source.connect(pan);
        pan.connect(gain);
    } else {
        source.connect(gain);
    }
    gain.connect(masterGain);
    source.start(now);
    source.stop(now + buffer.duration);
}

function getOriginalGuitarParams() {
    const cutoffRatio = clampRuntimeValue(state.cutoff / GUITAR_CONTROL_DEFAULTS.cutoff, 0.45, 1.45);
    const fxRatio = GUITAR_CONTROL_DEFAULTS.fx > 0
        ? clampRuntimeValue(state.faders.FX / GUITAR_CONTROL_DEFAULTS.fx, 0, 2.4)
        : 1;
    return {
        ...ORIGINAL_GUITAR_PARAMS,
        cutoff: clampRuntimeValue(ORIGINAL_GUITAR_PARAMS.cutoff * cutoffRatio, 0.18, 0.92),
        release: state.hold ? ORIGINAL_GUITAR_PARAMS.release * 1.28 : ORIGINAL_GUITAR_PARAMS.release,
        reverb: clampRuntimeValue(ORIGINAL_GUITAR_PARAMS.reverb * fxRatio, 0, 0.82),
        chorus: clampRuntimeValue(ORIGINAL_GUITAR_PARAMS.chorus + state.mod * 0.10, 0, 0.34),
        vibrato: clampRuntimeValue(ORIGINAL_GUITAR_PARAMS.vibrato + state.mod * 0.06, 0, 0.18)
    };
}

function synthesizeOriginalGuitarBuffer(ctx, freq, velocity, p, options = {}) {
    const sampleRate = ctx.sampleRate;
    const period = clampRuntimeValue(Math.round(sampleRate / freq), 8, 2400);
    const duration = options.short ? 0.9 : clampRuntimeValue(1.7 + p.release * 0.48, 1.4, 4.4);
    const len = Math.max(period + 4, Math.floor(sampleRate * duration));
    const data = new Float32Array(len);
    const stringFactor = p.stringType === "nylon" ? 0.72 : 1.0;
    const noiseAmp = 0.58 * velocity * stringFactor;

    for (let i = 0; i < period; i++) {
        let n = (Math.random() * 2 - 1) * noiseAmp;
        if (["folk", "classical", "bossa", "ambient"].includes(p.style) && i > 1) {
            n = data[i - 2] * 0.16 + data[i - 1] * 0.52 + n * 0.32;
        }
        if (["metal", "funk"].includes(p.style)) {
            n = Math.sign(n) * Math.min(Math.abs(n * 3.5), 1) * 0.82;
        }
        data[i] = n;
    }

    let lp1 = 0;
    let lp2 = 0;
    let hp1 = 0;
    const decay = p.brightness;
    const cutoff = p.cutoff;
    const blend = cutoff * 0.45 + 0.28;
    const vibDepth = p.vibrato * 0.004;

    for (let i = period; i < len; i++) {
        const vib = vibDepth ? Math.round(Math.sin((i / sampleRate) * Math.PI * 2 * 5.8) * vibDepth * period) : 0;
        const read = clampRuntimeValue(i - period + vib, 0, i - 1);
        const next = clampRuntimeValue(read + 1, 0, i - 1);
        let ks = (data[read] * blend + data[next] * (1 - blend)) * decay;

        switch (p.style) {
            case "classical":
                lp1 += 0.22 * (ks - lp1);
                lp2 += 0.35 * (lp1 - lp2);
                ks = lp2;
                break;
            case "jazz":
                lp1 += 0.20 * (ks - lp1);
                lp2 += 0.30 * (lp1 - lp2);
                ks = lp2 * (1 + Math.sin(i / sampleRate * 3.1) * 0.012);
                break;
            case "blues":
                lp1 += 0.40 * (ks - lp1);
                lp2 += 0.15 * (lp1 - lp2);
                ks = softDrive(lp1 * 2.5, 2.0) * 0.65 + lp2 * 0.35;
                break;
            case "country":
                lp1 += 0.75 * (ks - lp1);
                ks = lp1 * 0.45 + (lp1 - lp2) * 0.55;
                lp2 = lp1;
                break;
            case "funk":
                lp1 += 0.60 * (ks - lp1);
                ks = softDrive(lp1 * 2.2, 1.8);
                break;
            case "metal":
                lp1 += 0.85 * (ks - lp1);
                ks = Math.max(-0.7, Math.min(0.7, lp1 * p.drive));
                hp1 = 0.9 * (hp1 + ks - lp2);
                lp2 = ks;
                ks = ks * 0.48 + hp1 * 0.52;
                break;
            case "shoegaze":
                lp1 += 0.55 * (ks - lp1);
                ks = softDrive(lp1 * 3.0, 2.5) * (1 + Math.sin(i / sampleRate * 2.3) * 0.05);
                break;
            case "ambient":
                lp1 += 0.18 * (ks - lp1);
                lp2 += 0.25 * (lp1 - lp2);
                ks = lp2 * (1 + Math.sin(i / sampleRate * 0.8) * 0.02);
                break;
            case "bossa":
                lp1 += 0.28 * (ks - lp1);
                lp2 += 0.42 * (lp1 - lp2);
                ks = lp2 * (1 + Math.sin(i / sampleRate * 5.5) * 0.006);
                break;
            default:
                lp1 += Math.max(0.18, cutoff) * (ks - lp1);
                ks = lp1;
        }

        data[i] = ks;
    }

    if (p.body > 0) {
        const bodyPeriod = Math.max(8, Math.round(sampleRate / (freq * 1.98)));
        const amount = p.body * 0.15;
        for (let i = bodyPeriod; i < len; i++) {
            data[i] += data[i - bodyPeriod] * amount;
        }
    }

    if (p.drive > 1.1) {
        for (let i = 0; i < len; i++) {
            data[i] = softDrive(data[i], p.drive);
        }
    }

    const buffer = ctx.createBuffer(1, len, sampleRate);
    buffer.getChannelData(0).set(data);
    return buffer;
}

function softDrive(sample, drive) {
    return (2 / Math.PI) * Math.atan(sample * drive) / Math.max(1, drive * 0.38);
}

function guitarLaneForMidi(midi) {
    return clampRuntimeValue(5 - Math.floor((midi - 40) / 5), 0, 5);
}

function playDrum(id, velocity = 0.85) {
    const ctx = ensureAudio();
    if (!ctx) return;
    if (ctx.state === "suspended") ctx.resume().catch(() => {});
    if (id === "openHat") id = "hatOpen";
    const now = ctx.currentTime;
    const out = ctx.createGain();
    const toneFactor = 0.62 + (1.38 - 0.62) * drumControls.tone;
    const decayFactor = 0.62 + (1.85 - 0.62) * drumControls.decay;
    const driveFactor = 0.9 + (1.38 - 0.9) * drumControls.drive;
    out.gain.value = state.faders.VOL * drumControls.level * velocity * driveFactor;
    out.connect(masterGain);
    out.connect(fxSend);
    if (fxSend) fxSend.gain.setTargetAtTime((state.faders.FX * 0.22) + (drumControls.space * 0.24), now, 0.015);

    if (id === "kick") {
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.setValueAtTime(135 * toneFactor, now);
        osc.frequency.exponentialRampToValueAtTime(42 * toneFactor, now + 0.18 * decayFactor);
        out.gain.setValueAtTime(velocity, now);
        out.gain.exponentialRampToValueAtTime(0.0001, now + 0.28 * decayFactor);
        osc.connect(out);
        osc.start(now);
        osc.stop(now + 0.3 * decayFactor);
        return;
    }

    if (id === "snare") {
        const body = ctx.createOscillator();
        const bodyGain = ctx.createGain();
        body.type = "triangle";
        body.frequency.setValueAtTime(190 * toneFactor, now);
        body.frequency.exponentialRampToValueAtTime(118 * toneFactor, now + 0.12 * decayFactor);
        bodyGain.gain.setValueAtTime(velocity * 0.34, now);
        bodyGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.16 * decayFactor);
        body.connect(bodyGain);
        bodyGain.connect(out);
        body.start(now);
        body.stop(now + 0.18);
    }

    if (id === "tom") {
        const body = ctx.createOscillator();
        body.type = "sine";
        body.frequency.setValueAtTime(210 * toneFactor, now);
        body.frequency.exponentialRampToValueAtTime(86 * toneFactor, now + 0.26 * decayFactor);
        out.gain.setValueAtTime(velocity * 0.72, now);
        out.gain.exponentialRampToValueAtTime(0.0001, now + 0.38 * decayFactor);
        body.connect(out);
        body.start(now);
        body.stop(now + 0.4 * decayFactor);
        return;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, (id === "crash" || id === "ride" ? 1.1 : 0.32) * decayFactor);
    const filter = ctx.createBiquadFilter();
    filter.type = id === "tom" ? "bandpass" : "highpass";
    filter.frequency.value = {
        snare: 1200,
        clap: 900,
        tom: 220,
        hat: 5200,
        hatOpen: 4300,
        crash: 3100,
        ride: 3800
    }[id] * toneFactor || 1600 * toneFactor;
    filter.Q.value = id === "tom" ? 5 : 0.8 + state.reso * 4;
    out.gain.setValueAtTime(velocity * (id === "hat" ? 0.34 : 0.62), now);
    out.gain.exponentialRampToValueAtTime(0.0001, now + (id === "crash" || id === "ride" ? 0.9 : 0.2) * decayFactor);
    noise.connect(filter);
    filter.connect(out);
    noise.start(now);
    noise.stop(now + 1.0 * decayFactor);
}

function drumForMidi(midi) {
    const pc = ((midi % 12) + 12) % 12;
    if (!WHITE_PCS.has(pc)) {
        if (midi < 55) return pc === 1 ? "kick" : "snare";
        if (midi < 64) return pc === 6 ? "tom" : "clap";
        return pc === 10 ? "crash" : "hatOpen";
    }

    const whiteSteps = [0, 2, 4, 5, 7, 9, 11];
    const octave = Math.floor((midi - 48) / 12);
    const step = whiteSteps.indexOf(pc);
    const whiteIndex = octave * 7 + step;
    if (whiteIndex <= 2) return "kick";
    if (whiteIndex <= 5) return "snare";
    if (whiteIndex <= 8) return whiteIndex === 8 ? "clap" : "tom";
    if (whiteIndex <= 11) return whiteIndex === 11 ? "hatOpen" : "hat";
    return whiteIndex >= 14 ? "ride" : "crash";
}

function triggerByMode(midi, velocity) {
    if (state.currentMode === "drum") {
        playDrum(drumForMidi(midi), velocity);
        return null;
    }
    if (state.currentMode === "guitar") {
        return createPluckVoice(midi, velocity);
    }
    if (state.currentMode === "bass") {
        return createSynthVoice(midi, velocity, { bass: true, wave: WAVES[state.currentWave]?.osc || WAVES.SAW.osc });
    }
    return createSynthVoice(midi, velocity);
}

function playKey(midi, object, pointerId = 0) {
    unlockAudio();
    const adjusted = midi + state.octaveShift;
    if (object) flashRuntimeMesh(object, true);
    updateDisplayForKey(adjusted);

    if (state.arp && state.currentMode === "drum") {
        const sequence = ["kick", "hat", "snare", "hatOpen", "tom", "crash"];
        sequence.forEach((id, index) => {
            window.setTimeout(() => {
                playDrum(id, 0.68);
                updateScreenCompat("DRUM KIT", id.toUpperCase(), "ARP");
            }, index * 105);
        });
        if (object) window.setTimeout(() => flashRuntimeMesh(object, false), 180);
        return;
    }

    if (state.arp && state.currentMode !== "guitar") {
        const pattern = [0, 4, 7, 12];
        pattern.forEach((offset, index) => {
            window.setTimeout(() => {
                const arpVoice = triggerByMode(adjusted + offset, 0.68);
                if (arpVoice) window.setTimeout(() => releaseVoice(arpVoice), state.currentMode === "bass" ? 260 : 210);
            }, index * 105);
        });
        if (object) window.setTimeout(() => flashRuntimeMesh(object, false), 180);
        return;
    }

    const voice = triggerByMode(adjusted, 0.82);
    if (voice) {
        activePointers.set(pointerId, { voice, key: object });
    } else if (object) {
        window.setTimeout(() => flashRuntimeMesh(object, false), 160);
    }
}

function pointerUp(pointerId) {
    const held = activePointers.get(pointerId);
    if (held) {
        if (held.key) flashRuntimeMesh(held.key, false);
        if (held.voice) releaseVoice(held.voice);
        activePointers.delete(pointerId);
    }
}

function cancelActiveControlPointers() {
    activePointers.forEach((held) => {
        if (held.key) flashRuntimeMesh(held.key, false);
        if (held.voice) releaseVoice(held.voice, { force: true });
    });
    activePointers.clear();
}

function midiToFrequencyPlain(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
}

function noteNameForMidi(midi) {
    return `${NOTE_NAMES[((midi % 12) + 12) % 12]}${Math.floor(midi / 12) - 1}`;
}

function createHulusiReedCurve(amount = 1.8) {
    const n = 2048;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
        const x = (i / (n - 1)) * 2 - 1;
        const reed = Math.tanh(x * amount) * 0.82 + Math.tanh((x + 0.08) * amount * 0.72) * 0.18;
        curve[i] = reed;
    }
    return curve;
}

function scheduleAudioParam(param, value, time, glide = 0.035) {
    if (!param || !audioCtx) return;
    param.cancelScheduledValues(time);
    param.setTargetAtTime(value, time, glide);
}

function clampHulusiValue(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

function hulusiDisplayNumberForHoleId(holeId) {

function getHulusiBaseMidi() {

function getHulusiDemoNote(displayNumber) {

    const baseFreq = midiToFrequencyPlain(getHulusiBaseMidi());

    return {

function hulusiStateValue(state) {
    if (state === 'closed') return 1;
    if (state === 'half') return 0.5;
    return 0;
}

function hulusiRealFingeringKey(states = hulusiRealFingeringStates, halfAsClosed = false) {
    return Array.from({ length: HULUSI_HOLE_COUNT }, (_, i) => {
        const state = states[i + 1] || 'open';
        if (state === 'half') return halfAsClosed ? '1' : 'h';
        return state === 'closed' ? '1' : '0';
    }).join('');
}

function getHulusiRealFingeringNote(states = hulusiRealFingeringStates) {
    const key = hulusiRealFingeringKey(states, false);
    const closedKey = hulusiRealFingeringKey(states, true);
    const exact = HULUSI_REAL_FINGERINGS.find((item) => item.key === key) ||
        HULUSI_REAL_FINGERINGS.find((item) => item.key === closedKey);
    const values = Array.from({ length: HULUSI_HOLE_COUNT }, (_, i) => hulusiStateValue(states[i + 1]));
    const halfCount = values.filter((value) => value === 0.5).length;
    let note = exact;

    if (!note) {
        let best = null;
        for (const candidate of HULUSI_REAL_FINGERINGS) {
            const candidateValues = candidate.key.split('').map((char) => char === '1' ? 1 : 0);
            const score = candidateValues.reduce((sum, value, index) => sum + Math.abs(value - values[index]), 0);
            if (!best || score < best.score) best = { candidate, score };
        }
        note = best?.candidate || HULUSI_REAL_FINGERINGS[0];
    }

    const cents = halfCount ? -Math.min(45, halfCount * 18) : 0;
    const midi = note.midi + cents / 100;
    const baseFreq = midiToFrequencyPlain(getHulusiBaseMidi());
    const freq = midiToFrequencyPlain(midi);
    return {
        ...note,
        midi,
        label: halfCount ? `${note.label} 半孔` : note.label,
        key,
        displayNumber: 0,
        downstreamClosed: halfCount,
        isCrossFingering: !exact || halfCount > 0,
        effectiveLengthRatio: baseFreq / freq
    };
}
