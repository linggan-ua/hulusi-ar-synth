function showHulusiCalibrationPanel() {
    if (!HULUSI_DEBUG_MODE) return;
    const toggle = document.getElementById('hulusi-calibration-toggle');
    if (toggle) toggle.classList.add('active');
    const panel = document.getElementById('hulusi-calibration-panel');
    const isSmallScreen = window.matchMedia && window.matchMedia('(max-width: 720px)').matches;
    if (panel && !isSmallScreen) panel.classList.add('active');
    if (toggle && panel) toggle.textContent = panel.classList.contains('active') ? '隐藏' : '校准';
    updateHulusiCalibrationPanel();
}

function toggleHulusiCalibrationPanel() {
    const panel = document.getElementById('hulusi-calibration-panel');
    const toggle = document.getElementById('hulusi-calibration-toggle');
    if (!panel) return;
    const isOpen = panel.classList.toggle('active');
    if (toggle) toggle.textContent = isOpen ? '隐藏' : '校准';
    updateHulusiCalibrationPanel();
}

function selectHulusiCalibrationHole(index) {
    hulusiCalibrationSelectedHole = Math.max(0, Math.min(HULUSI_HOLES.length - 1, index));
    updateHulusiCalibrationPanel();
}

function showHulusiFingeringControls() {
    const toggle = document.getElementById('hulusi-fingering-toggle');
    if (toggle) toggle.classList.add('visible');
    updateHulusiFingeringPanel();
}

function toggleHulusiFingeringPanel() {
    const panel = document.getElementById('hulusi-fingering-panel');
    if (!panel) return;
    panel.classList.toggle('active');
    updateHulusiFingeringPanel();
}

function cycleHulusiFingeringHole(displayNumber) {
    const current = hulusiRealFingeringStates[displayNumber] || 'open';
    const index = HULUSI_FINGERING_STATES.indexOf(current);
    hulusiRealFingeringStates[displayNumber] = HULUSI_FINGERING_STATES[(index + 1) % HULUSI_FINGERING_STATES.length];
    saveHulusiRealFingeringStates();
    updateHulusiFingeringPanel();
    refreshHulusiRealVoiceIfActive();
}

function setHulusiFingeringPreset(kind) {
    if (kind === 'open') {
        hulusiRealFingeringStates = Object.fromEntries(HULUSI_HOLES.map((hole) => [hole.display, 'open']));
    } else if (kind === 'closed') {
        hulusiRealFingeringStates = { ...HULUSI_REAL_DEFAULT_STATES };
    } else if (kind === 'demo5') {
        hulusiRealFingeringStates = { 1: 'open', 2: 'open', 3: 'open', 4: 'open', 5: 'open', 6: 'open', 7: 'closed' };
    }
    saveHulusiRealFingeringStates();
    updateHulusiFingeringPanel();
    refreshHulusiRealVoiceIfActive();
}

function hulusiFingeringStateLabel(state) {
    if (state === 'closed') return '闭';
    if (state === 'half') return '半';
    return '开';
}

function updateHulusiFingeringPanel() {
    const panel = document.getElementById('hulusi-fingering-panel');
    if (!panel) return;
    panel.querySelectorAll('[data-hulusi-mode]').forEach((button) => {
        button.classList.toggle('active', button.dataset.hulusiMode === hulusiPlayMode);
    });
    panel.querySelectorAll('[data-hulusi-fingering-hole]').forEach((button) => {
        const display = Number(button.dataset.hulusiFingeringHole);
        const state = hulusiRealFingeringStates[display] || 'open';
        button.classList.remove('open', 'half', 'closed');
        button.classList.add(state);
        button.textContent = hulusiFingeringStateLabel(state);
    });
    const summary = document.getElementById('hulusi-fingering-summary');
    if (summary) {
        const note = getHulusiRealFingeringNote(hulusiRealFingeringStates);
        const stateText = Array.from({ length: HULUSI_HOLE_COUNT }, (_, i) => {
            const display = i + 1;
            return `${display}:${hulusiFingeringStateLabel(hulusiRealFingeringStates[display])}`;
        }).join('  ');
        summary.textContent = `${hulusiPlayMode === 'real' ? '真实指法模式' : '简单演示模式'}  |  当前指法 ${note.label} (${note.note})  |  ${stateText}`;
    }
}

function selectHulusiCalibrationDisplay(displayNumber) {
    selectHulusiCalibrationHole(hulusiHoleIdForDisplayNumber(displayNumber));
}

function adjustSelectedHulusiHole(kind, amount) {
    const player = getHulusiDebugPlayer();
    if (!player) {
        showNotification('葫芦丝模型还在加载中');
        return;
    }
    const base = player.holeLayout.get(hulusiCalibrationSelectedHole);
    if (!base) return;
    const stepX = base.layout.length * 0.006;
    const stepY = base.layout.height * 0.10;
    const stepZ = base.layout.depth * 0.12;
    const patch = {};
    if (kind === 'x') patch.dx = amount * stepX;
    if (kind === 'y') patch.dy = amount * stepY;
    if (kind === 'z') patch.dz = amount * stepZ;
    if (kind === 'scale') patch.scale = amount * 0.06;
    player.adjustHole(hulusiCalibrationSelectedHole, patch);
    updateHulusiCalibrationPanel();
}

function getHulusiDebugModel() {
    return document.getElementById('debug-model28');
}

function resetHulusiDebugView(model = getHulusiDebugModel()) {
    if (!model) return;
    const d = HULUSI_DEBUG_MODEL_DEFAULT;
    model.setAttribute('position', `${d.position.x} ${d.position.y} ${d.position.z}`);
    model.setAttribute('rotation', `${d.rotation.x} ${d.rotation.y} ${d.rotation.z}`);
    model.setAttribute('scale', `${d.scale} ${d.scale} ${d.scale}`);
}

function adjustHulusiDebugView(kind, amount) {
    const model = getHulusiDebugModel();
    if (!model) return;
    const pos = model.object3D.position;
    const scale = model.object3D.scale.x || HULUSI_DEBUG_MODEL_DEFAULT.scale;
    if (kind === 'distance') pos.z += amount * 0.35;
    if (kind === 'height') pos.y += amount * 0.12;
    if (kind === 'scale') {
        const next = clampRuntimeValue(scale + amount * 0.025, 0.06, 0.42);
        model.object3D.scale.setScalar(next);
    }
    model.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
    model.setAttribute('scale', `${model.object3D.scale.x} ${model.object3D.scale.y} ${model.object3D.scale.z}`);
}

function resetSelectedHulusiHole(all = false) {
    const player = getHulusiDebugPlayer();
    if (!player) return;
    player.resetHoleCalibration(all ? null : hulusiCalibrationSelectedHole);
    updateHulusiCalibrationPanel();
}

function updateHulusiCalibrationPanel() {
    const panel = document.getElementById('hulusi-calibration-panel');
    if (!panel) return;
    panel.querySelectorAll('[data-hulusi-hole]').forEach((button) => {
        button.classList.toggle('active', Number(button.dataset.hulusiHole) === hulusiDisplayNumberForHoleId(hulusiCalibrationSelectedHole));
    });
    const readout = document.getElementById('hulusi-calibration-readout');
    if (!readout) return;
    const player = getHulusiDebugPlayer();
    const c = player ? player.getHoleCalibration(hulusiCalibrationSelectedHole) : { dx: 0, dy: 0, dz: 0, scale: 1 };
    readout.textContent = `孔 ${hulusiDisplayNumberForHoleId(hulusiCalibrationSelectedHole)}  x:${c.dx.toFixed(2)} y:${c.dy.toFixed(2)} z:${c.dz.toFixed(2)} size:${(c.scale || 1).toFixed(2)}`;
}

function showNotification(message, isError = false) {
    const notification = document.createElement('div');
    notification.style.cssText = `
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        background: ${isError ? 'rgba(211, 47, 47, 0.8)' : 'rgba(0, 0, 0, 0.8)'};
        color: white; padding: 12px 20px; border-radius: 25px;
        font-size: 14px; z-index: 10000; pointer-events: none; transition: opacity 0.3s; opacity: 1;`;
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.remove(), 300);
    }, 2500);
}

// 加载弹窗控制函数
function showLoadingOverlay(instrumentName) {
    const overlay = document.getElementById('loading-overlay');
    const title = document.getElementById('loading-title');
    const progressBar = document.getElementById('progress-bar');
    const text = document.getElementById('loading-text');

    if (!overlay) return;

    title.textContent = `正在加载 ${instrumentName} 模型`;
    progressBar.style.width = '0%';
    text.textContent = '0% - 预计需要 5-10 秒...';
    overlay.classList.remove('hidden');

    let progress = 0;
    // 模拟加载进度
    loadingInterval = setInterval(() => {
        progress += Math.random() * 5;
        if (progress > 95) {
            progress = 95; // 在加载完成前，最多只显示到95%
            clearInterval(loadingInterval);
        }
        progressBar.style.width = `${progress}%`;
        text.textContent = `${Math.round(progress)}% - 请稍候...`;
    }, 200);
}

function hideLoadingOverlay(isSuccess) {
    const overlay = document.getElementById('loading-overlay');
    const progressBar = document.getElementById('progress-bar');
    const text = document.getElementById('loading-text');

    if (!overlay) return;

    clearInterval(loadingInterval);
    loadingInterval = null;

    if (isSuccess) {
        progressBar.style.width = '100%';
        text.textContent = '加载完成!';
        setTimeout(() => {
            overlay.classList.add('hidden');
        }, 500); // 延迟半秒关闭，让用户看到"加载完成"
    } else {
        // 如果失败，立即隐藏
        overlay.classList.add('hidden');
    }
}

function updateInfoDisplay() {
    const infoDisplay = document.getElementById('info-display');
    const instrumentNameEl = infoDisplay.querySelector('.instrument-name');
    const instrumentDescEl = infoDisplay.querySelector('.instrument-desc');
    
    if (currentAudioManager) {
        const infoText = infoCache[currentAudioManager.markerId];
        if (infoText) {
            const lines = infoText.split('\n');
            instrumentNameEl.textContent = lines[0] || currentAudioManager.config.name;
            instrumentDescEl.textContent = lines[1] || '';
            infoDisplay.classList.add('active');
        } else {
            instrumentNameEl.textContent = currentAudioManager.config.name;
            instrumentDescEl.textContent = '正在加载描述...（取决于网络）';
            infoDisplay.classList.add('active');
        }
    } else {
        infoDisplay.classList.remove('active');
    }
}

function updateDockButtons() {
    const playBtn = document.getElementById('play-btn');
    const infoBtn = document.getElementById('info-btn');
    const resetBtn = document.getElementById('reset-btn');
    const modeBtn = document.getElementById('mode-btn');
    
    if (!playBtn || !infoBtn || !resetBtn || !modeBtn) return;
    
    if (currentAudioManager) {
        playBtn.classList.remove('disabled');
        infoBtn.classList.remove('disabled');
        resetBtn.classList.remove('disabled');
        modeBtn.classList.remove('disabled');
        modeBtn.classList.toggle('rotate-mode', modelGestureMode === 'rotate');
        modeBtn.classList.toggle('interact-mode', modelGestureMode === 'interact');
        const isHulusi = currentAudioManager.config && currentAudioManager.config.interactiveHulusi;
        modeBtn.title = modelGestureMode === 'interact'
            ? (isHulusi ? '音孔演奏模式' : '控件交互模式')
            : '整机旋转模式';
        modeBtn.innerHTML = modelGestureMode === 'interact' ? '<span class="emoji">☝️</span>' : '<span class="emoji">🔁</span>';
        if (currentAudioManager.isPlaying) {
            playBtn.innerHTML = '<span class="emoji">⏸️</span>';
            playBtn.classList.add('playing');
        } else {
            playBtn.innerHTML = '<span class="emoji">🎵</span>';
            playBtn.classList.remove('playing');
        }
    } else {
        playBtn.classList.add('disabled');
        infoBtn.classList.add('disabled');
        resetBtn.classList.add('disabled');
        modeBtn.classList.add('disabled');
        modeBtn.classList.remove('rotate-mode', 'interact-mode');
        modeBtn.innerHTML = '<span class="emoji">☝️</span>';
        playBtn.innerHTML = '<span class="emoji">🎵</span>';
        playBtn.classList.remove('playing');
    }
}

// 修改：startAR 函数 - 添加权限检测
async function startAR() {
    if (isARStarted) return;
    console.log('启动AR体验');
    
    // 检查权限状态
    const permissionStatus = await checkCameraPermission();
    console.log('Permission status:', permissionStatus);
    
    if (permissionStatus === 'denied') {
        console.log('Camera permission denied, showing error overlay');
        showPermissionErrorOverlay();
        return;
    } else if (permissionStatus === 'no-camera') {
        showNotification('❌ 未检测到摄像头设备', true);
        return;
    } else if (permissionStatus === 'unsupported') {
        showNotification('❌ 浏览器不支持摄像头功能', true);
        return;
    } else if (permissionStatus === 'error') {
        showNotification('⚠️ 摄像头访问出现错误，请重试', true);
        return;
    }
    
    // 在用户手势上下文中提前解锁合成音，提升移动端发声成功率
    await unlockSynthAudio();

    // 权限正常，启动AR
    isARStarted = true;
    startOverlay.classList.add('hidden');
    document.getElementById('ar-scene').classList.add('active');
    document.getElementById('dock-container').classList.add('active');

    // AR.js 创建的是 THREE.Camera 而非 PerspectiveCamera，导致 setFromCamera 失效
    // 给它打上 isPerspectiveCamera 标记，让所有 raycaster 正常工作
    (function patchARCamera() {
        var arScene = document.getElementById('ar-scene');
        var cam = arScene && arScene.camera;
        if (cam && cam.projectionMatrix && cam.projectionMatrix.elements[0] !== 0) {
            prepareRuntimeCameraForRaycast(cam);
            console.log('Patched AR.js camera for raycaster compatibility');
        } else {
            setTimeout(patchARCamera, 500);
        }
    })();

    // 设置超时检测，防止权限在启动过程中被拒绝
    permissionCheckTimeout = setTimeout(() => {
        // 如果5秒后还没有成功启动，可能存在权限问题
        const videos = document.querySelectorAll('video');
        if (videos.length === 0 || !videos[0].srcObject) {
            console.log('AR failed to start properly, checking permissions...');
            checkCameraPermission().then(status => {
                if (status === 'denied') {
                    showPermissionErrorOverlay();
                }
            });
        }
    }, 5000);
    
    applyIOSVideoFix();
}

function applyIOSVideoFix() {
    const device = getDeviceInfo();
    if (!device.isIOS) {
        return;
    }
    console.log("Applying iOS video fix...");
    let fixAttempts = 0;
    const maxAttempts = 20;
    
    const fixVideoElements = () => {
        fixAttempts++;
        const videos = document.querySelectorAll('video');
        
        if (videos.length > 0) {
            console.log(`Found ${videos.length} video element(s). Applying attributes.`);
            videos.forEach(video => {
                if (!video.hasAttribute('data-ios-fixed')) {
                    video.setAttribute('playsinline', '');
                    video.setAttribute('webkit-playsinline', '');
                    video.setAttribute('muted', '');
                    video.setAttribute('autoplay', '');
                    video.setAttribute('data-ios-fixed', 'true');
                    video.play().catch(e => console.warn("Initial video play failed, this is often expected.", e));
                }
            });
            // 清除权限检测超时
            clearTimeout(permissionCheckTimeout);
            return;
        }
        
        if (fixAttempts < maxAttempts) {
            setTimeout(fixVideoElements, 300);
        } else {
            console.warn("Could not find video element to apply iOS fix after multiple attempts.");
        }
    };
    
    setTimeout(fixVideoElements, 500);
}

}

    window.location.reload(); 
}

function setupHulusiDebugMode() {
    if (!HULUSI_DEBUG_MODE) return;
    const scene = document.getElementById('ar-scene');
    const config = instrumentConfig.marker28;
    if (!scene || !config) return;

    console.log('启动葫芦丝无扫码调试模式');
    isARStarted = true;
    startOverlay?.classList.add('hidden');
    scene.classList.add('active');
    document.getElementById('dock-container')?.classList.add('active');

    currentAudioManager = {
        markerId: 'marker28',
        config,
        get audio() { return audioCache.marker28; },
        isPlaying: false
    };
    modelGestureMode = 'interact';
    updateInfoDisplay();
    updateDockButtons();
    unlockSynthAudio();

    if (config.audio && !audioCache.marker28) {
        const audio = new Audio(config.audio);
        audio.preload = 'auto';
        audio.load();
        audioCache.marker28 = audio;
    }
    if (!infoCache.marker28) {
        fetchWithRetry(config.info, 2, 500, `${config.name}描述`)
            .then(response => response.text())
            .then(text => {
                infoCache.marker28 = text || '';
                updateInfoDisplay();
            })
            .catch(() => {});
    }
    if (!markdownCache.marker28) {
        fetchWithRetry(config.markdown, 2, 500, `${config.name}介绍`)
            .then(response => response.text())
            .then(text => markdownCache.marker28 = text)
        .catch(() => {});
    }

    const oldDebugModel = document.getElementById('debug-model28');
    if (oldDebugModel) oldDebugModel.remove();
    const debugModel = document.createElement('a-entity');
    debugModel.id = 'debug-model28';
    scene.appendChild(debugModel);

    const activateDebugModel = () => {
        debugModel.setAttribute('visible', true);
        debugModel.object3D.visible = true;
        resetHulusiDebugView(debugModel);
    };
    debugModel.setAttribute('data-marker-id', 'marker28');
    debugModel.setAttribute('gltf-model', `url(${config.model})`);
    debugModel.setAttribute('runtime-hulusi-player', '');
    debugModel.setAttribute('touch-handler', 'minScale: 0.12; maxScale: 1.2');
    activateDebugModel();
    scene.addEventListener('loaded', activateDebugModel, { once: true });
    setTimeout(activateDebugModel, 300);
    setTimeout(activateDebugModel, 1200);
    debugModel.addEventListener('model-loaded', () => {
        showHulusiCalibrationPanel();
        showHulusiFingeringControls();
        showNotification('葫芦丝调试模式：可切换简单演示/真实指法');
        console.log('葫芦丝调试模型已加载');
    }, { once: true });
    window.addEventListener('hulusi-player-ready', () => {
        showHulusiCalibrationPanel();
        showHulusiFingeringControls();
    }, { once: true });
}

function backToStart() {
    const deniedUI = document.querySelector('.permission-denied-overlay');
    if (deniedUI) deniedUI.remove();
    hidePermissionErrorOverlay();
    document.getElementById('ar-scene').classList.remove('active');
    const dockContainer = document.getElementById('dock-container');
    if (dockContainer) dockContainer.classList.remove('active');
    startOverlay.classList.remove('hidden');
    isARStarted = false;
}

document.addEventListener('DOMContentLoaded', function() {
    console.log('页面加载完成，准备启动AR。');
    createStartOverlay();
    setupHulusiDebugMode();
    
    // 设置AR场景错误处理
    setupARSceneErrorHandling();
    
    // 保留原有的错误监听器作为后备
    window.addEventListener('unhandledrejection', function(event) {
        if (HULUSI_DEBUG_MODE) return;
        if (isARStarted && event.reason && (event.reason.name === 'NotAllowedError' || (event.reason.message && event.reason.message.includes('not allowed')))) {
            console.log('捕获到权限拒绝错误 (unhandledrejection)');
            event.preventDefault();
            setTimeout(() => {
                showPermissionErrorOverlay();
            }, 500);
        }
    });
    
    // 新增：监听getUserMedia错误
    window.addEventListener('error', function(event) {
        if (HULUSI_DEBUG_MODE) return;
        if (event.error && (
            event.error.name === 'NotAllowedError' || 
            event.error.message.includes('Permission') ||
            event.error.message.includes('denied')
        )) {
            console.log('捕获到权限拒绝错误 (error event)');
            setTimeout(() => {
                showPermissionErrorOverlay();
            }, 500);
        }
    });
});

  </script>
 </head>
