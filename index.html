function normalizeHulusiFingeringInput(input) {
    const baseMidi = getHulusiBaseMidi();
    if (input && typeof input === 'object' && Number.isFinite(input.midi)) {
        const freq = midiToFrequencyPlain(input.midi);
        const baseFreq = midiToFrequencyPlain(baseMidi);
        return {
            ...input,
            effectiveLengthRatio: input.effectiveLengthRatio || baseFreq / freq,
            downstreamClosed: input.downstreamClosed || 0,
            isCrossFingering: Boolean(input.isCrossFingering)
        };
    }

    const midi = Number.isFinite(input) ? input : baseMidi;
    const freq = midiToFrequencyPlain(midi);
    return {
        label: noteNameForMidi(Math.round(midi)),
        note: noteNameForMidi(Math.round(midi)),
        midi,
        firstOpenHole: 0,
        downstreamClosed: 0,
        isCrossFingering: false,
        effectiveLengthRatio: midiToFrequencyPlain(baseMidi) / freq
    };
}

function getHulusiAcousticParams(fingering, freq, velocity = 0.82) {
    const lengthRatio = clampHulusiValue(fingering.effectiveLengthRatio || 1, 0.48, 1.04);
    const shortness = clampHulusiValue((1.04 - lengthRatio) / 0.56, 0, 1);
    const downstream = clampHulusiValue(fingering.downstreamClosed || 0, 0, HULUSI_HOLE_COUNT);
    const cross = fingering.isCrossFingering ? 1 : 0;
    const damping = cross * 0.22 + downstream * 0.035;

    return {
        lengthRatio,
        pipeFrequency: Math.max(520, freq * (1.62 + lengthRatio * 0.58) - downstream * 16),
        pipeQ: clampHulusiValue(3.35 - shortness * 0.45 - damping, 1.45, 3.6),
        pipeGain: clampHulusiValue(7.0 - shortness * 0.7 - downstream * 0.12, 4.8, 7.4),
        gourdFrequency: 330 + shortness * 78 - downstream * 4,
        gourdGain: clampHulusiValue(4.25 - shortness * 0.35 - cross * 0.18, 3.1, 4.4),
        nasalFrequency: 600 + freq * (0.30 + lengthRatio * 0.19) - downstream * 18,
        nasalQ: clampHulusiValue(2.95 - shortness * 0.4 - damping * 0.8, 1.55, 3.1),
        airLowpassFrequency: clampHulusiValue(2920 + shortness * 820 - downstream * 110 - cross * 220, 2100, 4100),
        breathPeak: (0.052 + shortness * 0.012 + downstream * 0.004) * velocity,
        breathSustain: (0.018 + shortness * 0.009 + downstream * 0.003) * velocity,
        reedAttack: (0.60 - shortness * 0.04 - cross * 0.025) * velocity,
        reedSustain: (0.41 - shortness * 0.025 - downstream * 0.006) * velocity,
        octaveAttack: (0.085 + lengthRatio * 0.030 - cross * 0.010) * velocity,
        octaveSustain: (0.040 + lengthRatio * 0.018 - cross * 0.006) * velocity,
        droneSustain: (0.014 + lengthRatio * 0.006) * velocity,
        chiffFrequency: 2300 + shortness * 760 - downstream * 55
    };
}

function createHulusiVoice(fingeringInput, velocity = 0.82) {
    const ctx = ensureAudio();
    if (!ctx) return null;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});

    const now = ctx.currentTime;
    if (activeHulusiVoice && !activeHulusiVoice.released) {
        releaseHulusiVoice(activeHulusiVoice, { force: true, quick: true });
    }
    const fingering = normalizeHulusiFingeringInput(fingeringInput);
    const midi = fingering.midi;
    const freq = midiToFrequencyPlain(midi);
    const acoustic = getHulusiAcousticParams(fingering, freq, velocity);
    const oscillator = ctx.createOscillator();
    const subOscillator = ctx.createOscillator();
    const droneOscillator = ctx.createOscillator();
    const reedGain = ctx.createGain();
    const subGain = ctx.createGain();
    const droneGain = ctx.createGain();
    const reedShaper = ctx.createWaveShaper();
    const breathSource = ctx.createBufferSource();
    const breathGain = ctx.createGain();
    const breathHighpass = ctx.createBiquadFilter();
    const breathBandpass = ctx.createBiquadFilter();
    const chiffSource = ctx.createBufferSource();
    const chiffGain = ctx.createGain();
    const chiffBandpass = ctx.createBiquadFilter();
    const gourdResonator = ctx.createBiquadFilter();
    const pipeResonator = ctx.createBiquadFilter();
    const nasalFilter = ctx.createBiquadFilter();
    const airLowpass = ctx.createBiquadFilter();
    const output = ctx.createGain();
    const vibrato = ctx.createOscillator();
    const vibratoGain = ctx.createGain();
    const pressure = ctx.createOscillator();
    const pressureGain = ctx.createGain();

    if (hulusiPeriodicWave) oscillator.setPeriodicWave(hulusiPeriodicWave);
    else oscillator.type = 'triangle';
    if (hulusiPeriodicWave) subOscillator.setPeriodicWave(hulusiPeriodicWave);
    else subOscillator.type = 'triangle';
    if (hulusiPeriodicWave) droneOscillator.setPeriodicWave(hulusiPeriodicWave);
    else droneOscillator.type = 'triangle';

    oscillator.frequency.setValueAtTime(freq * 0.985, now);
    oscillator.frequency.exponentialRampToValueAtTime(freq, now + 0.055);
    subOscillator.frequency.setValueAtTime(freq * 2.005, now);
    droneOscillator.frequency.setValueAtTime(midiToFrequencyPlain(55), now);

    vibrato.frequency.value = 5.1;
    vibratoGain.gain.setValueAtTime(0.8, now);
    vibratoGain.gain.linearRampToValueAtTime(5.8, now + 0.32);
    vibrato.connect(vibratoGain);
    vibratoGain.connect(oscillator.detune);
    vibratoGain.connect(subOscillator.detune);

    pressure.frequency.value = 2.25;
    pressureGain.gain.value = 0.035 * velocity;
    pressure.connect(pressureGain);
    pressureGain.connect(reedGain.gain);

    reedGain.gain.setValueAtTime(0.0001, now);
    reedGain.gain.linearRampToValueAtTime(acoustic.reedAttack * 0.82, now + 0.070);
    reedGain.gain.setTargetAtTime(acoustic.reedSustain * 0.90, now + 0.12, 0.20);
    subGain.gain.setValueAtTime(0.0001, now);
    subGain.gain.linearRampToValueAtTime(acoustic.octaveAttack * 0.82, now + 0.095);
    subGain.gain.setTargetAtTime(acoustic.octaveSustain, now + 0.18, 0.22);
    droneGain.gain.setValueAtTime(0.0001, now);
    droneGain.gain.linearRampToValueAtTime(0.030 * velocity, now + 0.18);
    droneGain.gain.setTargetAtTime(acoustic.droneSustain, now + 0.35, 0.5);
    reedShaper.curve = createHulusiReedCurve(1.9);
    reedShaper.oversample = '2x';

    breathSource.buffer = makeNoiseBuffer(ctx, 2.4);
    chiffSource.buffer = makeNoiseBuffer(ctx, 0.18);
    breathGain.gain.setValueAtTime(0.0001, now);
    breathGain.gain.linearRampToValueAtTime(acoustic.breathPeak * 0.72, now + 0.055);
    breathGain.gain.setTargetAtTime(acoustic.breathSustain, now + 0.16, 0.45);
    breathHighpass.type = 'highpass';
    breathHighpass.frequency.value = 780;
    breathBandpass.type = 'bandpass';
    breathBandpass.frequency.value = 1850;
    breathBandpass.Q.value = 0.9;
    chiffGain.gain.setValueAtTime(0.001, now);
    chiffGain.gain.linearRampToValueAtTime(0.034 * velocity, now + 0.018);
    chiffGain.gain.exponentialRampToValueAtTime(0.001, now + 0.075);
    chiffBandpass.type = 'bandpass';
    chiffBandpass.frequency.value = acoustic.chiffFrequency;
    chiffBandpass.Q.value = 1.8;

    gourdResonator.type = 'peaking';
    gourdResonator.frequency.value = acoustic.gourdFrequency;
    gourdResonator.Q.value = 0.82;
    gourdResonator.gain.value = acoustic.gourdGain;
    pipeResonator.type = 'peaking';
    pipeResonator.frequency.value = acoustic.pipeFrequency;
    pipeResonator.Q.value = acoustic.pipeQ;
    pipeResonator.gain.value = acoustic.pipeGain;

    nasalFilter.type = 'bandpass';
    nasalFilter.frequency.setValueAtTime(acoustic.nasalFrequency, now);
    nasalFilter.Q.value = acoustic.nasalQ;
    airLowpass.type = 'lowpass';
    airLowpass.frequency.value = acoustic.airLowpassFrequency;
    airLowpass.Q.value = 0.72;

    output.gain.setValueAtTime(0.0001, now);
    output.gain.linearRampToValueAtTime(0.54, now + 0.070);
    output.gain.setTargetAtTime(0.46, now + 0.14, 0.30);

    oscillator.connect(reedGain);
    subOscillator.connect(subGain);
    droneOscillator.connect(droneGain);
    reedGain.connect(reedShaper);
    subGain.connect(reedShaper);
    droneGain.connect(reedShaper);
    breathSource.connect(breathGain);
    breathGain.connect(breathHighpass);
    breathHighpass.connect(breathBandpass);
    breathBandpass.connect(gourdResonator);
    chiffSource.connect(chiffGain);
    chiffGain.connect(chiffBandpass);
    chiffBandpass.connect(pipeResonator);
    reedShaper.connect(gourdResonator);
    gourdResonator.connect(pipeResonator);
    pipeResonator.connect(nasalFilter);
    nasalFilter.connect(airLowpass);
    airLowpass.connect(output);
    output.connect(masterGain);
    if (fxSend) output.connect(fxSend);

    oscillator.start(now);
    subOscillator.start(now);
    droneOscillator.start(now);
    breathSource.start(now);
    chiffSource.start(now);
    chiffSource.stop(now + 0.18);
    vibrato.start(now);
    pressure.start(now);

    state.lastFreq = freq;
    const voice = {
        source: oscillator,
        oscillator,
        subOscillator,
        droneOscillator,
        gain: output,
        reedGain,
        subGain,
        droneGain,
        reedShaper,
        gourdResonator,
        pipeResonator,
        nasalFilter,
        airLowpass,
        breathSource,
        breathGain,
        breathHighpass,
        breathBandpass,
        chiffSource,
        chiffGain,
        chiffBandpass,
        vibrato,
        vibratoGain,
        pressure,
        pressureGain,
        fingering,
        velocity,
        minHoldUntil: now + 0.035,
        released: false,
        releaseTimer: 0
    };
    activeHulusiVoice = voice;
    return voice;
}

function setHulusiVoicePitch(voice, fingeringInput) {
    if (!voice || !audioCtx || voice.released || !voice.oscillator) return;
    const now = audioCtx.currentTime;
    const fingering = normalizeHulusiFingeringInput(fingeringInput);
    const midi = fingering.midi;
    const freq = midiToFrequencyPlain(midi);
    const acoustic = getHulusiAcousticParams(fingering, freq, voice.velocity || 0.82);
    scheduleAudioParam(voice.oscillator.frequency, freq, now, 0.035);
    scheduleAudioParam(voice.subOscillator?.frequency, freq * 2.005, now, 0.04);
    scheduleAudioParam(voice.pipeResonator?.frequency, acoustic.pipeFrequency, now, 0.05);
    scheduleAudioParam(voice.pipeResonator?.Q, acoustic.pipeQ, now, 0.05);
    scheduleAudioParam(voice.pipeResonator?.gain, acoustic.pipeGain, now, 0.05);
    scheduleAudioParam(voice.gourdResonator?.frequency, acoustic.gourdFrequency, now, 0.06);
    scheduleAudioParam(voice.gourdResonator?.gain, acoustic.gourdGain, now, 0.06);
    scheduleAudioParam(voice.nasalFilter?.frequency, acoustic.nasalFrequency, now, 0.05);
    scheduleAudioParam(voice.nasalFilter?.Q, acoustic.nasalQ, now, 0.05);
    scheduleAudioParam(voice.airLowpass?.frequency, acoustic.airLowpassFrequency, now, 0.06);
    scheduleAudioParam(voice.reedGain?.gain, acoustic.reedSustain, now, 0.075);
    scheduleAudioParam(voice.subGain?.gain, acoustic.octaveSustain, now, 0.075);
    scheduleAudioParam(voice.droneGain?.gain, acoustic.droneSustain, now, 0.12);
    scheduleAudioParam(voice.breathGain?.gain, acoustic.breathSustain, now, 0.08);
    voice.fingering = fingering;
}

function releaseHulusiVoice(voice, options = {}) {
    if (!voice || !audioCtx || voice.released) return;
    const now = audioCtx.currentTime;
    const wait = (options.force || options.quick) ? 0 : Math.max(0, (voice.minHoldUntil || now) - now);
    if (wait > 0.005) {
        if (!voice.releaseTimer) {
            voice.releaseTimer = window.setTimeout(() => releaseHulusiVoice(voice, { ...options, force: true }), wait * 1000);
        }
        return;
    }
    voice.released = true;
    if (voice.releaseTimer) {
        window.clearTimeout(voice.releaseTimer);
        voice.releaseTimer = 0;
    }
    try {
        voice.gain.gain.cancelScheduledValues(now);
        const releaseTau = (options.force || options.quick) ? 0.012 : 0.045;
        const stopDelay = (options.force || options.quick) ? 0.060 : 0.14;
        voice.gain.gain.setTargetAtTime(0.0001, now, releaseTau);
        voice.reedGain?.gain.setTargetAtTime(0.0001, now, releaseTau);
        voice.subGain?.gain.setTargetAtTime(0.0001, now, releaseTau);
        voice.droneGain?.gain.setTargetAtTime(0.0001, now, releaseTau * 1.5);
        voice.breathGain?.gain.setTargetAtTime(0.0001, now, releaseTau);
        voice.chiffGain?.gain.setTargetAtTime(0.0001, now, 0.006);
        voice.source.stop(now + stopDelay);
        voice.subOscillator?.stop(now + stopDelay);
        voice.droneOscillator?.stop(now + stopDelay + 0.03);
        voice.breathSource?.stop(now + stopDelay);
        voice.vibrato?.stop(now + stopDelay);
        voice.pressure?.stop(now + stopDelay);
    } catch (err) {}
    if (activeHulusiVoice === voice) activeHulusiVoice = null;
    window.setTimeout(() => {
        try {
            voice.source.disconnect();
            voice.subOscillator?.disconnect();
            voice.droneOscillator?.disconnect();
            voice.gain.disconnect();
            voice.reedGain?.disconnect();
            voice.subGain?.disconnect();
            voice.droneGain?.disconnect();
            voice.reedShaper?.disconnect();
            voice.gourdResonator?.disconnect();
            voice.pipeResonator?.disconnect();
            voice.nasalFilter?.disconnect();
            voice.airLowpass?.disconnect();
            voice.breathSource?.disconnect();
            voice.breathGain?.disconnect();
            voice.breathHighpass?.disconnect();
            voice.breathBandpass?.disconnect();
            voice.chiffSource?.disconnect();
            voice.chiffGain?.disconnect();
            voice.chiffBandpass?.disconnect();
            voice.vibrato?.disconnect();
            voice.vibratoGain?.disconnect();
            voice.pressure?.disconnect();
            voice.pressureGain?.disconnect();
        } catch (err) {}
    }, 420);
}

AFRAME.registerComponent('runtime-hulusi-player', {
    init: function () {
        this.interactives = [];
        this.holeMeshes = new Map();
        this.holeLayout = new Map();
        this.calibration = loadHulusiCalibration();
        this.active = new Map();
        this.closedDisplayHoles = new Set();
        this.currentDisplayNumber = null;
        this.currentVoice = null;
        this.currentFingering = null;
        this.playMode = hulusiPlayMode;
        this.realInteraction = null;
        this.realPointerId = null;
        this.pointerHandledUntil = 0;
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        this.handleClick = this.handleClick.bind(this);
        this.handlePointerDown = this.handlePointerDown.bind(this);
        this.handlePointerMove = this.handlePointerMove.bind(this);
        this.handlePointerUp = this.handlePointerUp.bind(this);
        this.el.classList.add('playable');
        addRuntimeControlListeners(this);
        this.el.addEventListener('model-loaded', () => this.build());
        if (this.el.getObject3D('mesh')) this.build();
    },

    build: function () {
        if (this.built) return;
        const model = this.el.getObject3D('mesh');
        if (!model) return;
        const targetMesh = this.findHoleCarrierMesh(model) || model;
        this.built = true;
        const layout = this.getHoleCarrierLayout(targetMesh);
        console.log('Hulusi hole carrier layout:', targetMesh.name, layout);
        this.group = new THREE.Group();
        this.group.name = 'Hulusi_Touch_Holes';
        targetMesh.add(this.group);
        this.holeCarrierMesh = targetMesh;
        this.modelRoot = model;

        const rail = new THREE.Mesh(
            new THREE.BoxGeometry(layout.length * 0.92, layout.height * 0.18, layout.depth * 0.28),
            makeRuntimeMaterial({ color: 0x23150b, roughness: 0.62, metalness: 0.08, transparent: true, opacity: 0.42 })
        );
        rail.position.set(layout.centerX, layout.centerY, layout.surfaceZ + layout.depth * 0.34);
        this.group.add(rail);

        HULUSI_HOLES.forEach((hole) => {
            const x = layout.minX + layout.length * hole.xRatio;
            const y = layout.centerY + layout.height * (HULUSI_HOLE_CENTER_Y_OFFSET + (hole.yOffset || 0));
            const z = layout.surfaceZ + layout.depth * HULUSI_HOLE_SURFACE_OFFSET;
            const radius = Math.max(layout.height * 0.28, layout.length * 0.013);
            const hitW = Math.max(radius * HULUSI_HOLE_HIT_WIDTH_SCALE, layout.length * 0.030);
            const hitH = Math.max(radius * HULUSI_HOLE_HIT_HEIGHT_SCALE, layout.height * 0.72);
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(radius, radius * 0.13, 10, 28),
                makeRuntimeMaterial({ color: 0xf2c46f, emissive: 0x7a3f09, roughness: 0.34, metalness: 0.22 })
            );
            ring.position.set(x, y, z + layout.depth * 0.22);
            ring.userData.baseColor = 0xf2c46f;
            ring.userData.activeColor = 0xff5a36;
            ring.userData.baseZ = ring.position.z;
            this.group.add(ring);

            const cap = new THREE.Mesh(
                new THREE.CircleGeometry(radius * 0.76, 28),
                makeRuntimeMaterial({ color: 0x130906, roughness: 0.75, metalness: 0.02, transparent: true, opacity: 0.62 })
            );
            cap.position.set(x, y, z + layout.depth * 0.24);
            this.group.add(cap);

            const hit = new THREE.Mesh(
                new THREE.BoxGeometry(hitW, hitH, Math.max(layout.depth * 3.2, radius * 0.7)),
                new THREE.MeshBasicMaterial({
                    color: 0x30d6ff,
                    transparent: true,
                    opacity: HULUSI_HIT_MESH_DEBUG ? 0.28 : 0,
                    depthWrite: false,
                    side: THREE.DoubleSide
                })
            );
            hit.position.set(x, y, z + layout.depth * 0.5);
            hit.userData.baseColor = 0x130906;
            hit.userData.activeColor = 0xff5a36;
            hit.userData.baseZ = hit.position.z;
            hit.userData.interaction = { kind: 'hulusi-hole', ...hole, ring, cap };
            this.group.add(hit);
            this.interactives.push(hit);
            this.holeMeshes.set(hole.id, { hit, ring, cap });
            this.holeLayout.set(hole.id, { x, y, z, radius, hitW, hitH, hitD: Math.max(layout.depth * 3.2, radius * 0.7), layout });

            if (HULUSI_HOLE_NUMBER_LABELS) {
                const label = addRuntimeMeshLabel(
                    this.group,
                    String(hulusiDisplayNumberForHoleId(hole.id)),
                    x,
                    y + layout.height * 1.15,
                    z + layout.depth * 0.62,
                    layout.length * 0.04,
                    layout.height * 0.95,
                    { fontSize: 52, color: '#ffffff', background: 'rgba(0, 0, 0, 0.78)' }
                );
                label.userData.hulusiDebugLabel = true;
                this.holeMeshes.get(hole.id).label = label;
            }
            this.applyHoleCalibration(hole.id);
        });
        this.buildRealInteraction(model, targetMesh);
        this.setPlayMode(hulusiPlayMode);
        window.dispatchEvent(new CustomEvent('hulusi-player-ready', { detail: { component: this } }));
    },

    buildRealInteraction: function (model, targetMesh) {
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        const localCenter = targetMesh.worldToLocal(center.clone());
        const scale = targetMesh.getWorldScale(new THREE.Vector3());
        const width = Math.max(size.x / Math.max(scale.x, 0.0001), 1);
        const height = Math.max(size.y / Math.max(scale.y, 0.0001), 1);
        const depth = Math.max(size.z / Math.max(scale.z, 0.0001), 0.5);
        const hit = new THREE.Mesh(
            new THREE.BoxGeometry(width * 1.08, height * 1.18, depth * 1.25),
            new THREE.MeshBasicMaterial({
                color: 0x80ffb8,
                transparent: true,
                opacity: HULUSI_HIT_MESH_DEBUG ? 0.10 : 0,
                depthWrite: false,
                side: THREE.DoubleSide
            })
        );
        hit.name = 'Hulusi_Real_Fingering_Hit';
        hit.position.copy(localCenter);
        hit.userData.interaction = { kind: 'hulusi-real-body' };
        targetMesh.add(hit);
        this.realInteraction = hit;
    },

    setPlayMode: function (mode) {
        this.playMode = mode === 'real' ? 'real' : 'demo';
        this.clearFingering(true);
        this.interactives = [];
        const demoVisible = this.playMode === 'demo';
        this.holeMeshes.forEach((meshes) => {
            meshes.hit.visible = demoVisible;
            meshes.ring.visible = demoVisible;
            meshes.cap.visible = demoVisible;
            if (meshes.label) meshes.label.visible = demoVisible;
            if (demoVisible) this.interactives.push(meshes.hit);
        });
        if (this.realInteraction) {
            this.realInteraction.visible = this.playMode === 'real';
            if (this.playMode === 'real') this.interactives.push(this.realInteraction);
        }
        updateHulusiFingeringPanel();
    },

    getHoleCalibration: function (holeId) {
        const key = String(holeId);
        if (!this.calibration[key]) {
            this.calibration[key] = { dx: 0, dy: 0, dz: 0, scale: 1 };
        }
        if (holeId === 6 && this.calibration[key].dx === HULUSI_DEFAULT_CALIBRATION[6].dx) {
            const currentBase = this.holeLayout.get(6);
            const previousBase = this.holeLayout.get(5);
            const beforePreviousBase = this.holeLayout.get(4);
            const previousCalibration = this.calibration['5'] || HULUSI_DEFAULT_CALIBRATION[5];
            const beforePreviousCalibration = this.calibration['4'] || HULUSI_DEFAULT_CALIBRATION[4];
            if (currentBase && previousBase && beforePreviousBase) {
                const previous = {
                    x: previousBase.x + previousCalibration.dx,
                    y: previousBase.y + previousCalibration.dy,
                    z: previousBase.z + previousCalibration.dz
                };
                const beforePrevious = {
                    x: beforePreviousBase.x + beforePreviousCalibration.dx,
                    y: beforePreviousBase.y + beforePreviousCalibration.dy,
                    z: beforePreviousBase.z + beforePreviousCalibration.dz
                };
                const target = {
                    x: previous.x + (previous.x - beforePrevious.x),
                    y: previous.y + (previous.y - beforePrevious.y),
                    z: previous.z + (previous.z - beforePrevious.z)
                };
                this.calibration[key] = {
                    ...this.calibration[key],
                    dx: target.x - currentBase.x,
                    dy: target.y - currentBase.y,
                    dz: target.z - currentBase.z
                };
            }
        }
        return this.calibration[key];
    },

    applyHoleCalibration: function (holeId) {
        const base = this.holeLayout.get(holeId);
        const meshes = this.holeMeshes.get(holeId);
        if (!base || !meshes) return;
        const c = this.getHoleCalibration(holeId);
        const x = base.x + c.dx;
        const y = base.y + c.dy;
        const z = base.z + c.dz;
        const s = c.scale || 1;
        meshes.ring.position.set(x, y, z + base.layout.depth * 0.22);
        meshes.cap.position.set(x, y, z + base.layout.depth * 0.24);
        meshes.hit.position.set(x, y, z + base.layout.depth * 0.5);
        meshes.ring.scale.setScalar(s);
        meshes.cap.scale.setScalar(s);
        meshes.hit.scale.set(s, s, Math.max(0.35, s));
        if (meshes.label) {
            meshes.label.position.set(x, y + base.layout.height * 1.15, z + base.layout.depth * 0.62);
        }
    },

    adjustHole: function (holeId, patch) {
        const c = this.getHoleCalibration(holeId);
        c.dx += patch.dx || 0;
        c.dy += patch.dy || 0;
        c.dz += patch.dz || 0;
        if (patch.scale) c.scale = clampRuntimeValue((c.scale || 1) + patch.scale, 0.45, 1.85);
        this.applyHoleCalibration(holeId);
        saveHulusiCalibration(this.calibration);
        return { ...c };
    },

    resetHoleCalibration: function (holeId = null) {
        if (holeId === null || holeId === undefined) {
            this.calibration = { ...HULUSI_DEFAULT_CALIBRATION };
            this.holeLayout.forEach((_, id) => this.applyHoleCalibration(id));
        } else {
            this.calibration[String(holeId)] = { ...HULUSI_DEFAULT_CALIBRATION[String(holeId)] };
            this.applyHoleCalibration(holeId);
        }
        saveHulusiCalibration(this.calibration);
    },

    getHoleCarrierLayout: function (targetMesh) {
        const box = new THREE.Box3();
        if (targetMesh.geometry) {
            if (!targetMesh.geometry.boundingBox) targetMesh.geometry.computeBoundingBox();
            box.copy(targetMesh.geometry.boundingBox);
        } else {
            box.setFromObject(targetMesh);
        }
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        return {
            minX: box.min.x,
            maxX: box.max.x,
            centerX: center.x,
            centerY: center.y,
            surfaceZ: box.max.z,
            length: Math.max(size.x, 1),
            height: Math.max(size.y, 1),
            depth: Math.max(size.z, 0.25)
        };
    },

    findHoleCarrierMesh: function (model) {
        let match = null;
        model.traverse((object) => {
            if (match || !object.isMesh) return;
            const name = object.name || '';
            if (name.includes(HULUSI_HOLE_MESH_NAME_HINT)) match = object;
        });
        return match;
    },

    isActiveInstrument: function () {
        const markerId = this.el.getAttribute('data-marker-id') || this.el.parentElement?.id;
        return currentAudioManager && currentAudioManager.markerId === markerId;
    },

    setHoleActive: function (holeId, active) {
        const meshes = this.holeMeshes.get(holeId);
        if (!meshes) return;
        const color = active ? 0xff5a36 : 0xf2c46f;
        meshes.ring.material.color.setHex(color);
        meshes.ring.material.emissive.setHex(active ? 0xff7a2a : 0x7a3f09);
        meshes.ring.material.emissiveIntensity = active ? 0.85 : 0.28;
        meshes.cap.material.color.setHex(active ? 0xffb35c : 0x130906);
        meshes.cap.material.opacity = active ? 0.82 : 0.62;
        meshes.ring.scale.setScalar(active ? 1.18 : 1);
    },

    setHoleClosedByDisplay: function (displayNumber, closed) {
        const holeId = hulusiHoleIdForDisplayNumber(displayNumber);
        if (closed) this.closedDisplayHoles.add(displayNumber);
        else this.closedDisplayHoles.delete(displayNumber);
        this.setHoleActive(holeId, closed);
    },

    isDisplayHeldByAnother: function (displayNumber, ignorePointerId = null) {
        for (const [pointerId, held] of this.active.entries()) {
            if (pointerId !== ignorePointerId && held.displayNumber === displayNumber) return true;
        }
        return false;
    },

    updateFingeringVoice: function (displayNumber = null) {
        if (displayNumber) this.currentDisplayNumber = displayNumber;
        if (!this.currentDisplayNumber || !this.closedDisplayHoles.has(this.currentDisplayNumber)) {
            const heldDisplays = Array.from(this.closedDisplayHoles);
            this.currentDisplayNumber = heldDisplays.length ? heldDisplays[heldDisplays.length - 1] : null;
        }
        if (!this.currentDisplayNumber) {
            this.releaseFingeringVoiceIfOpen();
            return;
        }

        const fingering = getHulusiDemoNote(this.currentDisplayNumber);
        const stateText = Array.from({ length: HULUSI_HOLE_COUNT }, (_, i) => {
            const display = i + 1;
            return this.closedDisplayHoles.has(display) ? display : '○';
        }).join(' ');
        if (!this.currentVoice) {
            this.currentVoice = createHulusiVoice(fingering, 0.88);
        } else {
            setHulusiVoicePitch(this.currentVoice, fingering);
        }
        this.currentFingering = fingering;
        showNotification(`葫芦丝 孔${fingering.displayNumber} ${fingering.label} (${fingering.note})  触摸 ${stateText}`);
    },

    releaseFingeringVoiceIfOpen: function () {
        if (this.closedDisplayHoles.size > 0) return;
        if (this.currentVoice) releaseHulusiVoice(this.currentVoice, { quick: true });
        this.currentVoice = null;
        this.currentFingering = null;
        this.currentDisplayNumber = null;
        this.realPointerId = null;
    },

    clearFingering: function (force = true) {
        this.closedDisplayHoles.forEach((displayNumber) => {
            this.setHoleActive(hulusiHoleIdForDisplayNumber(displayNumber), false);
        });
        this.closedDisplayHoles.clear();
        this.active.clear();
        if (this.currentVoice) releaseHulusiVoice(this.currentVoice, { force });
        this.currentVoice = null;
        this.currentFingering = null;
        this.currentDisplayNumber = null;
        this.realPointerId = null;
    },

    startRealFingering: function (pointerId) {
        unlockAudio();
        if (this.realPointerId === pointerId && this.currentVoice && !this.currentVoice.released) return;
        this.realPointerId = pointerId;
        const fingering = getHulusiRealFingeringNote(hulusiRealFingeringStates);
        if (!this.currentVoice) {
            this.currentVoice = createHulusiVoice(fingering, 0.88);
        } else {
            setHulusiVoicePitch(this.currentVoice, fingering);
        }
        this.currentFingering = fingering;
        const keyText = Array.from({ length: HULUSI_HOLE_COUNT }, (_, i) => {
            const state = hulusiRealFingeringStates[i + 1];
            return state === 'closed' ? `${i + 1}` : state === 'half' ? `${i + 1}/` : '○';
        }).join(' ');
        showNotification(`真实指法 ${fingering.label} (${fingering.note})  ${keyText}`);
    },

    stopRealFingering: function (pointerId = null, force = false) {
        if (pointerId !== null && this.realPointerId !== null && pointerId !== this.realPointerId) return;
        if (this.currentVoice) releaseHulusiVoice(this.currentVoice, { force, quick: true });
        this.currentVoice = null;
        this.currentFingering = null;
        this.realPointerId = null;
    },

    raycastInteractives: function (evt) {
        const camera = this.el.sceneEl.camera;
        if (!camera || !this.interactives.length) return null;
        this.el.object3D.updateMatrixWorld(true);
        const { pointer, canvasRect } = setRuntimeRaycasterFromEvent(this.raycaster, this.mouse, this.el.sceneEl, camera, evt);
        const rayHit = getRuntimeRaycastHit(this.raycaster, this.interactives);
        if (rayHit) return rayHit;
        return findRuntimeScreenSpaceHit(this.interactives, camera, canvasRect, pointer, 10);
    },

    raycastAtPointer: function (pointer) {
        const camera = this.el.sceneEl.camera;
        if (!camera || !this.interactives.length) return null;
        const canvasRect = getRuntimeCanvasRect(this.el.sceneEl);
        this.mouse.x = ((pointer.x - canvasRect.left) / canvasRect.width) * 2 - 1;
        this.mouse.y = -((pointer.y - canvasRect.top) / canvasRect.height) * 2 + 1;
        this.el.sceneEl.object3D.updateMatrixWorld(true);
        this.el.object3D.updateMatrixWorld(true);
        prepareRuntimeCameraForRaycast(camera);
        this.raycaster.setFromCamera(this.mouse, camera);
        const rayHit = getRuntimeRaycastHit(this.raycaster, this.interactives);
        if (rayHit) return rayHit;
        return findRuntimeScreenSpaceHit(this.interactives, camera, canvasRect, pointer, 10);
    },

    startHole: function (pointerId, interaction) {
        unlockAudio();
        const existing = this.active.get(pointerId);
        if (existing && existing.holeId === interaction.id && this.currentVoice && !this.currentVoice.released) return;
        if (existing) this.stopHole(pointerId, true);
        const displayNumber = hulusiDisplayNumberForHoleId(interaction.id);
        this.active.set(pointerId, { holeId: interaction.id, displayNumber });
        this.setHoleClosedByDisplay(displayNumber, true);
        this.updateFingeringVoice(displayNumber);
    },

    slideHole: function (pointerId, interaction) {
        const held = this.active.get(pointerId);
        if (!held || held.holeId === interaction.id) return;
        const previousDisplay = held.displayNumber;
        if (!this.isDisplayHeldByAnother(previousDisplay, pointerId)) {
            this.setHoleClosedByDisplay(previousDisplay, false);
        }
        held.holeId = interaction.id;
        held.displayNumber = hulusiDisplayNumberForHoleId(interaction.id);
        this.setHoleClosedByDisplay(held.displayNumber, true);
        this.updateFingeringVoice(held.displayNumber);
    },

    stopHole: function (pointerId, force = false) {
        const held = this.active.get(pointerId);
        if (!held) return;
        this.active.delete(pointerId);
        if (!this.isDisplayHeldByAnother(held.displayNumber)) {
            this.setHoleClosedByDisplay(held.displayNumber, false);
        }
        if (this.currentDisplayNumber === held.displayNumber) this.currentDisplayNumber = null;
        if (force && this.currentVoice) {
            releaseHulusiVoice(this.currentVoice, { force: true });
            this.currentVoice = null;
            this.currentDisplayNumber = null;
        } else {
            this.releaseFingeringVoiceIfOpen();
            if (this.closedDisplayHoles.size > 0) this.updateFingeringVoice();
        }
    },

    handlePointerDown: function (evt) {
        if (!this.el.getAttribute('visible') || !this.isActiveInstrument()) return;
        if (modelGestureMode !== 'interact') return;
        if (isRuntimeUiEvent(evt)) return;
        const source = (evt.detail && (evt.detail.mouseEvent || evt.detail.touchEvent)) || evt;
        if ((evt.type === 'pointerdown' || evt.type === 'mousedown') && Date.now() < this.pointerHandledUntil) return;
        if (source.changedTouches && source.changedTouches.length) {
            let handled = false;
            Array.from(source.changedTouches).forEach((touch) => {
                const hit = this.raycastAtPointer(getRuntimePointerFromTouch(touch));
                if (!hit) return;
                if (this.playMode === 'real') {
                    if (hit.interaction.kind !== 'hulusi-real-body') return;
                    handled = true;
                    this.startRealFingering(`touch-${touch.identifier}`);
                    return;
                }
                if (hit.interaction.kind !== 'hulusi-hole') return;
                handled = true;
                this.startHole(`touch-${touch.identifier}`, hit.interaction);
            });
            if (handled) {
                evt.stopPropagation();
                if (evt.preventDefault) evt.preventDefault();
                runtimeControlPointerActive = true;
                this.pointerHandledUntil = Date.now() + 650;
            }
            return;
        }
        if (Date.now() < this.pointerHandledUntil && (evt.type === 'touchstart' || evt.type === 'mousedown')) return;
        const hit = this.raycastInteractives(evt);
        if (!hit) return;
        if (this.playMode === 'real' && hit.interaction.kind !== 'hulusi-real-body') return;
        if (this.playMode !== 'real' && hit.interaction.kind !== 'hulusi-hole') return;
        evt.stopPropagation();
        if (evt.preventDefault) evt.preventDefault();
        runtimeControlPointerActive = true;
        this.pointerHandledUntil = Date.now() + 450;
        if (this.playMode === 'real') {
            this.startRealFingering(getRuntimePointerId(evt));
            return;
        }
        this.startHole(getRuntimePointerId(evt), hit.interaction);
    },

    handlePointerMove: function (evt) {
        if (!this.el.getAttribute('visible') || modelGestureMode !== 'interact') return;
        if (isRuntimeUiEvent(evt)) return;
        const source = (evt.detail && (evt.detail.mouseEvent || evt.detail.touchEvent)) || evt;
        if (source.changedTouches && source.changedTouches.length) {
            let handled = false;
            Array.from(source.changedTouches).forEach((touch) => {
                const pointerId = `touch-${touch.identifier}`;
                if (!this.active.has(pointerId)) return;
                const hit = this.raycastAtPointer(getRuntimePointerFromTouch(touch));
                if (hit && hit.interaction.kind === 'hulusi-hole') {
                    handled = true;
                    this.slideHole(pointerId, hit.interaction);
                }
            });
            if (handled && evt.preventDefault) evt.preventDefault();
            return;
        }
        const pointerId = getRuntimePointerId(evt);
        if (!this.active.has(pointerId)) return;
        const hit = this.raycastInteractives(evt);
        if (hit && hit.interaction.kind === 'hulusi-hole') {
            if (evt.preventDefault) evt.preventDefault();
            this.slideHole(pointerId, hit.interaction);
        }
    },

    handlePointerUp: function (evt) {
        if (isRuntimeUiEvent(evt)) return;
        const source = (evt.detail && (evt.detail.mouseEvent || evt.detail.touchEvent)) || evt;
        if (this.playMode === 'real') {
            if (source.changedTouches && source.changedTouches.length) {
                Array.from(source.changedTouches).forEach((touch) => this.stopRealFingering(`touch-${touch.identifier}`));
            } else {
                this.stopRealFingering(getRuntimePointerId(evt));
            }
            runtimeControlPointerActive = false;
            if (evt.preventDefault) evt.preventDefault();
            return;
        }
        if (source.changedTouches && source.changedTouches.length) {
            Array.from(source.changedTouches).forEach((touch) => this.stopHole(`touch-${touch.identifier}`));
            if (!this.active.size) runtimeControlPointerActive = false;
            if (evt.preventDefault) evt.preventDefault();
            return;
        }
        const pointerId = getRuntimePointerId(evt);
        this.stopHole(pointerId);
        if (!this.active.size) runtimeControlPointerActive = false;
    },

    handleClick: function (evt) {
        if (!this.el.getAttribute('visible') || !this.isActiveInstrument()) return;
        if (modelGestureMode !== 'interact') return;
        if (this.playMode === 'real') return;
        if (isRuntimeUiEvent(evt)) return;
        if (Date.now() < this.pointerHandledUntil) return;
        const hit = this.raycastInteractives(evt);
        if (!hit || hit.interaction.kind !== 'hulusi-hole') return;
        evt.stopPropagation();
        if (evt.preventDefault) evt.preventDefault();
        unlockAudio();
        const displayNumber = hulusiDisplayNumberForHoleId(hit.interaction.id);
        const nextClosed = !this.closedDisplayHoles.has(displayNumber);
        this.setHoleClosedByDisplay(displayNumber, nextClosed);
        if (this.closedDisplayHoles.size > 0) this.updateFingeringVoice(nextClosed ? displayNumber : null);
        else this.releaseFingeringVoiceIfOpen();
    },

    remove: function () {
        this.active.forEach((held, pointerId) => this.stopHole(pointerId, true));
        if (this.currentVoice) releaseHulusiVoice(this.currentVoice, { force: true });
        removeRuntimeControlListeners(this);
    }
});

    updateOriginalKnobVisual: function (knob) {
        const angle = -2.25 + 4.5 * knob.value;
        knob.indicator.rotation.z = -angle;
        knob.group.children[0].material.emissiveIntensity = 0.12 + knob.value * 0.7;
    },

    updateOriginalFaderVisual: function (fader) {
        const thumbY = fader.y - fader.length / 2 + fader.value * fader.length;
        fader.thumb.position.set(fader.x, thumbY, 0.24);
        fader.fill.scale.y = Math.max(0.04, fader.value);
        fader.fill.position.y = fader.y - fader.length / 2 + (fader.length * fader.value) / 2;
        fader.thumb.material.emissiveIntensity = 0.18 + fader.value * 0.75;
    },

    updateOriginalStripVisual: function (id) {
        const strip = this.strips.get(id);
        if (!strip) return;
        strip.fill.position.y = strip.centerY - 0.12 + strip.value * 0.24;
        strip.fill.material.emissiveIntensity = 0.18 + strip.value * 0.9;
    },

    updateContinuousControl: function (interaction, delta) {
        if (interaction.kind === 'knob') {
            const knob = this.knobs.get(interaction.id);
            if (!knob) return;
            knob.value = clampRuntimeValue(knob.value + delta);
            if (interaction.id === 'cutoff') runtimeSynthState.cutoff = knob.value;
            if (interaction.id === 'reso') runtimeSynthState.reso = knob.value;
            this.updateOriginalKnobVisual(knob);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id.toUpperCase()} ${Math.round(knob.value * 100)}`);
            return;
        }
        if (interaction.kind === 'fader') {
            const fader = this.faders.get(interaction.id);
            if (!fader) return;
            fader.value = clampRuntimeValue(fader.value + delta);
            runtimeSynthState.faders[interaction.id] = fader.value;
            this.updateOriginalFaderVisual(fader);
            if (interaction.id === 'VOL' && masterGain && audioCtx) masterGain.gain.setTargetAtTime(fader.value, audioCtx.currentTime, 0.02);
            if (interaction.id === 'FX' && fxSend && audioCtx) fxSend.gain.setTargetAtTime(fader.value * 0.34, audioCtx.currentTime, 0.02);
            if (interaction.id === 'FX' && guitarReverbGain && audioCtx) guitarReverbGain.gain.setTargetAtTime(getOriginalGuitarParams().reverb * 0.36, audioCtx.currentTime, 0.02);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${Math.round(fader.value * 100)}`);
            return;
        }
        if (interaction.kind === 'strip') {
            const strip = this.strips.get(interaction.id);
            if (!strip) return;
            strip.value = clampRuntimeValue(strip.value + delta);
            if (interaction.id === 'PITCH') runtimeSynthState.pitch = strip.value;
            if (interaction.id === 'MOD') runtimeSynthState.mod = strip.value;
            this.updateOriginalStripVisual(interaction.id);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${Math.round(strip.value * 100)}`);
        }
    },

    stepContinuousControl: function (interaction) {
        const step = interaction.kind === 'strip' ? 0.25 : 0.12;
        this.updateContinuousControl(interaction, step);
        if (interaction.kind === 'knob') {
            const knob = this.knobs.get(interaction.id);
            if (knob && knob.value >= 0.98) this.updateContinuousControl(interaction, -0.94);
        }
        if (interaction.kind === 'fader') {
            const fader = this.faders.get(interaction.id);
            if (fader && fader.value >= 0.98) this.updateContinuousControl(interaction, -0.96);
        }
        if (interaction.kind === 'strip') {
            const strip = this.strips.get(interaction.id);
            if (strip && strip.value >= 0.98) this.updateContinuousControl(interaction, -1);
        }
    },

    raycastInteractives: function (evt) {
        const camera = this.el.sceneEl.camera;
        if (!camera) return null;
        this.el.object3D.updateMatrixWorld(true);
        const { pointer, canvasRect } = setRuntimeRaycasterFromEvent(this.raycaster, this.mouse, this.el.sceneEl, camera, evt);
        const rayHit = getRuntimeRaycastHit(this.raycaster, this.interactives);
        if (rayHit) {
            const rayHitBox = getRuntimeObjectScreenBox(rayHit.object, camera, canvasRect);
            if (!rayHitBox || isPointerInsideRuntimeBox(pointer, rayHitBox, runtimeTouchHitPadding * 1.6)) {
                return rayHit;
            }
        }
        return findRuntimeScreenSpaceHit(this.interactives, camera, canvasRect, pointer) || rayHit;
    },

    handlePointerDown: function (evt) {
        if (!this.el.getAttribute('visible')) return;
        if (modelGestureMode !== 'interact') return;
        if (!this.raycaster || !this.mouse) { console.warn('raycaster/mouse not ready'); return; }
        if (Date.now() < this.pointerHandledUntil && (evt.type === 'touchstart' || evt.type === 'mousedown')) return;
        const pointer = getRuntimeEventPointer(evt);
        const pointerId = getRuntimePointerId(evt);
        const hit = this.raycastInteractives(evt);
        if (!hit) { console.log('no hit ndc:', this.mouse.x.toFixed(2), this.mouse.y.toFixed(2), 'interactives:', this.interactives.length); return; }
        const { object, interaction } = hit;
        evt.stopPropagation();
        if (evt.preventDefault) evt.preventDefault();
        runtimeControlPointerActive = true;
        this.pointerHandledUntil = Date.now() + 500;

        if (interaction.kind === 'preset') return this.selectPreset(interaction.id);
        if (interaction.kind === 'wave') return this.selectWave(interaction.id);
        if (interaction.kind === 'performance') {
            const key = interaction.id.toLowerCase();
            runtimeSynthState[key] = !runtimeSynthState[key];
            setRuntimeButtonActive(object, runtimeSynthState[key], 0x63e6be);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${runtimeSynthState[key] ? 'ON' : 'OFF'}`);
            return;
        }
        if (interaction.kind === 'octave') {
            flashRuntimeMesh(object, true);
            this.shiftOctave(interaction.semitoneDelta);
            setTimeout(() => flashRuntimeMesh(object, false), 110);
            return;
        }
        if (interaction.kind === 'key') {
            this.activeKeys.set(pointerId, object);
            playKey(interaction.midi, object, pointerId);
            return;
        }
        if (interaction.kind === 'knob' || interaction.kind === 'fader' || interaction.kind === 'strip') {
            this.dragState = {
                interaction,
                lastX: pointer.x,
                lastY: pointer.y,
                totalX: 0,
                totalY: 0,
                moved: false
            };
        }
    },

    handlePointerMove: function (evt) {
        if (!this.el.getAttribute('visible')) { this.dragState = null; return; }
        if (!this.dragState) return;
        if (evt.preventDefault) evt.preventDefault();
        const pointer = getRuntimeEventPointer(evt);
        const dx = pointer.x - this.dragState.lastX;
        const dy = pointer.y - this.dragState.lastY;
        this.dragState.lastX = pointer.x;
        this.dragState.lastY = pointer.y;
        this.dragState.totalX += dx;
        this.dragState.totalY += dy;
        if (Math.abs(this.dragState.totalX) + Math.abs(this.dragState.totalY) > 3) this.dragState.moved = true;
        const delta = this.dragState.interaction.kind === 'strip' ? (-dy / 160) : (((-dy) + dx * 0.45) / 180);
        this.updateContinuousControl(this.dragState.interaction, delta);
    },

    handlePointerUp: function (evt) {
        runtimeControlPointerActive = false;
        const pointerId = getRuntimePointerId(evt);
        pointerUp(pointerId);
        if (this.activeKeys) {
            this.activeKeys.delete(pointerId);
        }
        if (this.dragState) {
            this.dragState = null;
        }
    },

    handleClick: function (evt) {
        if (!this.el.getAttribute('visible')) return;
        if (modelGestureMode !== 'interact') return;
        if (Date.now() < this.pointerHandledUntil) return;
        const hit = this.raycastInteractives(evt);
        if (!hit) return;
        const { object, interaction } = hit;
        evt.stopPropagation();
        if (interaction.kind === 'preset') return this.selectPreset(interaction.id);
        if (interaction.kind === 'wave') return this.selectWave(interaction.id);
        if (interaction.kind === 'performance') {
            const key = interaction.id.toLowerCase();
            runtimeSynthState[key] = !runtimeSynthState[key];
            setRuntimeButtonActive(object, runtimeSynthState[key], 0x63e6be);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${runtimeSynthState[key] ? 'ON' : 'OFF'}`);
            return;
        }
        if (interaction.kind === 'octave') return this.shiftOctave(interaction.semitoneDelta);
        if (interaction.kind === 'key') {
            const pointerId = getRuntimePointerId(evt);
            playKey(interaction.midi, object, pointerId);
            window.setTimeout(() => pointerUp(pointerId), 180);
            return;
        }
        if (interaction.kind === 'knob') {
            const knob = this.knobs.get(interaction.id);
            if (!knob) return;
            knob.value = Math.min(1, knob.value + 0.12);
            if (knob.value >= 1) knob.value = 0.04;
            if (interaction.id === 'cutoff') runtimeSynthState.cutoff = knob.value;
            if (interaction.id === 'reso') runtimeSynthState.reso = knob.value;
            this.updateOriginalKnobVisual(knob);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id.toUpperCase()} ${Math.round(knob.value * 100)}`);
            return;
        }
        if (interaction.kind === 'fader') {
            const fader = this.faders.get(interaction.id);
            if (!fader) return;
            fader.value = Math.min(1, fader.value + 0.12);
            if (fader.value >= 1) fader.value = 0.02;
            runtimeSynthState.faders[interaction.id] = fader.value;
            this.updateOriginalFaderVisual(fader);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${Math.round(fader.value * 100)}`);
            return;
        }
        if (interaction.kind === 'strip') {
            const strip = this.strips.get(interaction.id);
            if (!strip) return;
            strip.value = strip.value > 0.5 ? 0 : 1;
            if (interaction.id === 'PITCH') runtimeSynthState.pitch = strip.value ? 0.65 : 0.35;
            if (interaction.id === 'MOD') runtimeSynthState.mod = strip.value;
            this.updateOriginalStripVisual(interaction.id);
            this.updateScreen(runtimeSynthState.preset, runtimeSynthState.waveId, `${interaction.id} ${Math.round(strip.value * 100)}`);
        }
    },

    remove: function () {
        removeRuntimeControlListeners(this);
    }
});

    playPattern: function () {

        const tick = () => {
            if (!this._patternActive) return;
            const id = pattern[step];

                playRuntimeDrum(id, 0.82);
                const pad = this.pads && this.pads.get(id);

AFRAME.registerComponent('instrument-player', {
    init: function () {
        this.markerId = this.el.parentElement.id;
        this.config = instrumentConfig[this.markerId];
        
        // 绑定事件
        this.onClick = this.onClick.bind(this);
        this.onMouseDown = this.onMouseDown.bind(this);
        this.onMouseUp = this.onMouseUp.bind(this);
        
        this.el.addEventListener('mousedown', this.onMouseDown);
        this.el.addEventListener('mouseup', this.onMouseUp);
        
        this.mouseDownPos = { x: 0, y: 0 };
    },
    
    onMouseDown: function (evt) {
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        if (evt.detail && evt.detail.mouseEvent) {
            this.mouseDownPos = {
                x: evt.detail.mouseEvent.clientX,
                y: evt.detail.mouseEvent.clientY
            };
        }
    },
    
    onMouseUp: function (evt) {
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        
        let mouseUpPos = { x: 0, y: 0 };
        if (evt.detail && evt.detail.mouseEvent) {
            mouseUpPos = {
                x: evt.detail.mouseEvent.clientX,
                y: evt.detail.mouseEvent.clientY
            };
        }
        
        // 如果按下的位置和抬起的位置差别不大，视为“点击”而不是“拖拽”
        const dx = mouseUpPos.x - this.mouseDownPos.x;
        const dy = mouseUpPos.y - this.mouseDownPos.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 10) { // 阈值10像素
            this.onClick(evt);
        }
    },
    
    onClick: async function (evt) {
        // 防止事件冒泡或多重触发
        if (!this.config || !this.config.playSounds || this.config.playSounds.length === 0) return;
        
        // 随机选择一个音符播放
        const sounds = this.config.playSounds;
        const randomIndex = Math.floor(Math.random() * sounds.length);
        const soundItem = sounds[randomIndex];
        
        // 由于我们在配置里存的是 'C4', 'E4' 等音名，我们调用合成器播放
        // 如果未来换成了 mp3 路径，可在这里写 new Audio(soundItem).play()
        await playSynthNote(soundItem);
        
        // 可选：在界面上提示正在发声
        console.log(`[仿真弹奏] 乐器: ${this.config.name}, 音符: ${soundItem}`);
        
        // 为了视觉反馈，给模型添加一个短暂的放大缩小效果
        const currentScale = this.el.object3D.scale.clone();
        this.el.object3D.scale.multiplyScalar(1.05);
        setTimeout(() => {
            if (this.el && this.el.object3D) {
                this.el.object3D.scale.copy(currentScale);
            }
        }, 100);
    },
    
    isThisMarkerActive: function() {
        return currentAudioManager && currentAudioManager.markerId === this.markerId;
    },
    
    remove: function () {
        this.el.removeEventListener('mousedown', this.onMouseDown);
        this.el.removeEventListener('mouseup', this.onMouseUp);
    }
});

// 按需加载与事件处理组件 (instrument-handler)
AFRAME.registerComponent('instrument-handler', {
    init: function () {
        this.marker = this.el;
        this.markerId = this.marker.id;
        this.config = instrumentConfig[this.markerId];
        
        if (!this.config) {
            console.warn(`No config found for ${this.markerId}, skipping initialization.`);
            return;
        }

        this.modelEntity = this.marker.querySelector('[touch-handler]');
        this.modelEntity.setAttribute('visible', false);
        this.marker.addEventListener('markerFound', this.onMarkerFound.bind(this));
        this.marker.addEventListener('markerLost', this.onMarkerLost.bind(this));
    },

    onMarkerFound: function () {
        console.log(`Marker found: ${this.markerId} (${this.config.name})`);
        this.setActiveInstrument();
        restoreOutputForMarkerFound();
        if (this.config.isLoaded) {
            this.modelEntity.setAttribute('visible', true);
        } else {
            this.loadResources();
        }
    },

    onMarkerLost: function () {
        console.log(`Marker lost: ${this.markerId}. State will be preserved.`);
        cancelActiveControlPointers();
        if (this.modelEntity.components['runtime-hulusi-player']) {
            this.modelEntity.components['runtime-hulusi-player'].clearFingering(true);
            this.modelEntity.components['runtime-hulusi-player'].stopRealFingering(null, true);
        }
        muteOutputForMarkerLoss();
        if (this.config.model === 'runtime:drum-machine' && this.modelEntity.components['runtime-drum-machine']) {
            this.modelEntity.components['runtime-drum-machine'].stopPattern();
            if (currentAudioManager && currentAudioManager.markerId === this.markerId) {
                currentAudioManager.isPlaying = false;
                updateDockButtons();
            }
        }
        this.modelEntity.setAttribute('visible', false);
    },
    
    // ====================================================================
    // 修改：loadResources 函数 - 引入了模型和文本文件的加载重试机制
    // ====================================================================
    loadResources: function() {
        showLoadingOverlay(this.config.name);

        const loadTextResources = () => {
            if (!infoCache[this.markerId]) {
                fetchWithRetry(this.config.info, 3, 1000, `${this.config.name}描述`)
                    .then(response => response.text())
                    .then(text => {
                        infoCache[this.markerId] = text || '';
                        if (currentAudioManager && currentAudioManager.markerId === this.markerId) {
                            updateInfoDisplay();
                        }
                    })
                    .catch(err => console.error(`Failed to load info for ${this.markerId} after retries:`, err));
            }
            
            if (!markdownCache[this.markerId]) {
                 fetchWithRetry(this.config.markdown, 3, 1000, `${this.config.name}介绍`)
                    .then(response => response.text())
                    .then(text => markdownCache[this.markerId] = text)
                    .catch(err => {
                        console.error(`Failed to load markdown for ${this.markerId} after retries:`, err);
                        markdownCache[this.markerId] = `## 加载错误\n\n加载介绍内容时发生网络错误。请检查网络后刷新页面。`;
                    });
            }
        };

        if (this.config.model && this.config.model.startsWith('runtime:')) {
            const runtimeComponent = this.config.model === 'runtime:drum-machine'
                ? 'runtime-drum-machine'
                : 'runtime-synth-workstation';
            this.modelEntity.setAttribute(runtimeComponent, '');
            this.config.isLoaded = true;
            loadTextResources();
            hideLoadingOverlay(true);
            if (this.marker.object3D.visible) {
                 this.modelEntity.setAttribute('visible', true);
            }
            return;
        }
        
        // --- 模型加载与重试逻辑 ---
        let modelRetryCount = 0;
        const maxModelRetries = 3; // 模型最多重试3次

        const modelLoadHandler = () => {
            console.log(`${this.config.name} model loaded.`);
            if (this.config.interactiveHulusi) {
                this.modelEntity.setAttribute('runtime-hulusi-player', '');
                showHulusiFingeringControls();
            }
            this.config.isLoaded = true;
            hideLoadingOverlay(true);
            
            if (this.marker.object3D.visible) {
                 this.modelEntity.setAttribute('visible', true);
            }
            // 成功后移除监听器，避免内存泄漏
            this.modelEntity.removeEventListener('model-loaded', modelLoadHandler);
            this.modelEntity.removeEventListener('model-error', modelErrorHandler);
        };

        const modelErrorHandler = (e) => {
            modelRetryCount++;
            console.error(`Error loading model for ${this.markerId} (Attempt ${modelRetryCount}):`, e.detail);

            if (modelRetryCount < maxModelRetries) {
                showNotification(`${this.config.name} 模型加载失败，第 ${modelRetryCount} 次重试中...`, true);
                setTimeout(() => {
                    // 通过重新设置gltf-model属性来触发A-Frame的重新加载
                    this.modelEntity.setAttribute('gltf-model', `url(${this.config.model})`);
                }, 1500 * modelRetryCount); // 递增延迟重试
            } else {
                console.error(`All ${maxModelRetries} attempts failed for model ${this.config.name}.`);
                hideLoadingOverlay(false);
                showNotification(`${this.config.name} 模型加载失败，请检查网络后重试`, true);
                // 失败后同样移除监听器
                this.modelEntity.removeEventListener('model-loaded', modelLoadHandler);
                this.modelEntity.removeEventListener('model-error', modelErrorHandler);
            }
        };
        
        // 绑定可移除的事件监听器
        this.modelEntity.addEventListener('model-loaded', modelLoadHandler);
        this.modelEntity.addEventListener('model-error', modelErrorHandler);
        // 首次触发加载
        this.modelEntity.setAttribute('gltf-model', `url(${this.config.model})`);

        // --- 音频预加载 ---
        if (this.config.audio && !audioCache[this.markerId]) {
            const audio = new Audio(this.config.audio);
            audio.preload = 'auto';
            audio.load(); // 开始预加载
            audioCache[this.markerId] = audio;
        }

        // --- Info和Markdown文本加载与重试 ---
        loadTextResources();
    },

    setActiveInstrument: function() {
        const previousMarkerId = currentAudioManager && currentAudioManager.markerId;
        if (currentAudioManager && currentAudioManager.markerId !== this.markerId) {
            const previousModel = document.getElementById(`model${currentAudioManager.markerId.replace('marker', '')}`);
            const previousDrum = previousModel && previousModel.components['runtime-drum-machine'];
            if (previousDrum) previousDrum.stopPattern();
        }

        if (currentAudioManager && currentAudioManager.markerId !== this.markerId && currentAudioManager.audio && !currentAudioManager.audio.paused) {
            currentAudioManager.audio.pause();
            currentAudioManager.isPlaying = false;
        }
        
        currentAudioManager = {
            markerId: this.markerId,
            config: this.config,
            get audio() { return audioCache[this.markerId]; },
            isPlaying: (currentAudioManager && currentAudioManager.markerId === this.markerId) ? currentAudioManager.isPlaying : false
        };
        if (previousMarkerId !== this.markerId) {
            modelGestureMode = getDefaultGestureMode(this.config);
        }
        
        updateInfoDisplay();
        updateDockButtons();
    }
});

// 模型触摸交互组件 (touch-handler)
AFRAME.registerComponent('touch-handler', {
    schema: {
        rotateSensitivity: { type: 'number', default: 0.006 },
        minScale: { type: 'number', default: 0.3 },
        maxScale: { type: 'number', default: 3.0 }
    },
    init: function () {
        this.onTouchStart = this.onTouchStart.bind(this);
        this.onTouchMove = this.onTouchMove.bind(this);
        this.onTouchEnd = this.onTouchEnd.bind(this);
        this.onMouseDown = this.onMouseDown.bind(this);
        this.onMouseMove = this.onMouseMove.bind(this);
        this.onMouseUp = this.onMouseUp.bind(this);
        this.onWheel = this.onWheel.bind(this);
        this.el.sceneEl.addEventListener('touchstart', this.onTouchStart);
        this.el.sceneEl.addEventListener('touchmove', this.onTouchMove);
        this.el.sceneEl.addEventListener('touchend', this.onTouchEnd);
        this.el.sceneEl.addEventListener('mousedown', this.onMouseDown);
        window.addEventListener('mousemove', this.onMouseMove);
        window.addEventListener('mouseup', this.onMouseUp);
        this.el.sceneEl.addEventListener('wheel', this.onWheel, { passive: false });
        this.isDragging = false;
        this.isMouseDragging = false;
        this.isPinching = false;
        this.previousTouchPosition = { x: 0, y: 0 };
        this.previousMousePosition = { x: 0, y: 0 };
        this.initialPinchDistance = 0;
        this.model = this.el.object3D;
        this.markerId = this.el.getAttribute('data-marker-id') || this.el.parentElement.id;
        this.initialScale = new THREE.Vector3();
        this.initialRotation = new THREE.Euler();
        this.initialScale.copy(this.model.scale);
        this.initialRotation.copy(this.model.rotation);
        this.el.addEventListener('model-loaded', () => {
            this.initialScale.copy(this.model.scale);
            const o15Data = this.el.getAttribute('o15');
            if (o15Data) {
                 this.initialRotation.set(
                    THREE.Math.degToRad(o15Data.x),
                    THREE.Math.degToRad(o15Data.y),
                    THREE.Math.degToRad(o15Data.z)
                );
            } else {
                this.initialRotation.copy(this.model.rotation);
            }
        });
    },
    isThisMarkerActive: function() {
        return currentAudioManager && currentAudioManager.markerId === this.markerId;
    },
    canRotateModel: function () {
        return !runtimeControlPointerActive &&
            modelGestureMode === 'rotate' &&
            this.isThisMarkerActive() &&
            this.el.getAttribute('visible');
    },
    onMouseDown: function (e) {
        if (e.button !== 0 || !this.canRotateModel()) return;
        this.isMouseDragging = true;
        this.previousMousePosition = { x: e.clientX, y: e.clientY };
        e.preventDefault();
    },
    onMouseMove: function (e) {
        if (!this.isMouseDragging) return;
        if (!this.canRotateModel()) {
            this.isMouseDragging = false;
            return;
        }
        const deltaX = e.clientX - this.previousMousePosition.x;
        const deltaY = e.clientY - this.previousMousePosition.y;
        this.model.rotation.y += deltaX * this.data.rotateSensitivity;
        this.model.rotation.x += deltaY * this.data.rotateSensitivity;
        this.previousMousePosition = { x: e.clientX, y: e.clientY };
        e.preventDefault();
    },
    onMouseUp: function () {
        this.isMouseDragging = false;
    },
    onWheel: function (e) {
        if (!this.canRotateModel()) return;
        const scaleFactor = e.deltaY < 0 ? 1.06 : 0.94;
        const newScaleX = this.model.scale.x * scaleFactor;
        const relativeScale = newScaleX / this.initialScale.x;
        if (relativeScale >= this.data.minScale && relativeScale <= this.data.maxScale) {
            this.model.scale.multiplyScalar(scaleFactor);
        }
        e.preventDefault();
    },
    onTouchStart: function (e) {
        if (runtimeControlPointerActive || modelGestureMode !== 'rotate') {
            this.isDragging = false;
            this.isPinching = false;
            return;
        }
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        if (e.touches.length === 1) {
            this.isDragging = true;
            this.isPinching = false;
            this.previousTouchPosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            this.isDragging = false;
            this.isPinching = true;
            this.initialPinchDistance = this.getDistance(e.touches[0], e.touches[1]);
        }
    },
    onTouchMove: function (e) {
        if (runtimeControlPointerActive || modelGestureMode !== 'rotate') return;
        if (!this.isThisMarkerActive() || !this.el.getAttribute('visible')) return;
        if (this.isDragging && e.touches.length === 1) {
            const deltaX = e.touches[0].clientX - this.previousTouchPosition.x;
            const deltaY = e.touches[0].clientY - this.previousTouchPosition.y;
            this.model.rotation.y += deltaX * this.data.rotateSensitivity;
            this.model.rotation.x += deltaY * this.data.rotateSensitivity;
            this.previousTouchPosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        if (this.isPinching && e.touches.length === 2) {
            if (this.initialPinchDistance <= 0) return;
            const currentPinchDistance = this.getDistance(e.touches[0], e.touches[1]);
            const scaleFactor = currentPinchDistance / this.initialPinchDistance;
            const newScaleX = this.model.scale.x * scaleFactor;
            const relativeScale = newScaleX / this.initialScale.x;
            if (relativeScale >= this.data.minScale && relativeScale <= this.data.maxScale) {
                 this.model.scale.multiplyScalar(scaleFactor);
            }
            this.initialPinchDistance = currentPinchDistance;
        }
    },
    onTouchEnd: function (e) {
        if (e.touches.length < 2) this.isPinching = false;
        if (e.touches.length < 1) this.isDragging = false;
    },
    getDistance: function (touch1, touch2) {
        const dx = touch1.clientX - touch2.clientX;
        const dy = touch1.clientY - touch2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    },
    reset: function() {
        if (this.initialScale && this.initialRotation) {
            this.model.scale.copy(this.initialScale);
            this.model.rotation.copy(this.initialRotation);
        } else {
            console.warn("Cannot reset model: initial state not saved.");
        }
    },
    remove: function () {
        this.el.sceneEl.removeEventListener('touchstart', this.onTouchStart);
        this.el.sceneEl.removeEventListener('touchmove', this.onTouchMove);
        this.el.sceneEl.removeEventListener('touchend', this.onTouchEnd);
        this.el.sceneEl.removeEventListener('mousedown', this.onMouseDown);
        window.removeEventListener('mousemove', this.onMouseMove);
        window.removeEventListener('mouseup', this.onMouseUp);
        this.el.sceneEl.removeEventListener('wheel', this.onWheel);
    }
});

// toggleAudio 函数 - 增加了音频加载失败后的重试机制
function toggleAudio() {
    const playBtn = document.getElementById('play-btn');
    if (currentAudioManager && currentAudioManager.config && currentAudioManager.config.interactiveHulusi) {
        unlockAudio();
        currentAudioManager.isPlaying = false;
        if (playBtn) {
            playBtn.innerHTML = '<span class="emoji">🎵</span>';
            playBtn.classList.remove('playing');
        }
        updateDockButtons();
        showNotification(hulusiPlayMode === 'real' ? '按住葫芦丝按当前指法发声' : '点击音孔进行演示发声');
        return;
    }
    if (currentAudioManager && currentAudioManager.config.model && currentAudioManager.config.model.startsWith('runtime:')) {
        if (currentAudioManager.config.model === 'runtime:drum-machine') {
            const modelEl = document.getElementById(`model${currentAudioManager.markerId.replace('marker', '')}`);
            const drum = modelEl && modelEl.components['runtime-drum-machine'];
            if (drum) {
                if (currentAudioManager.isPlaying) {
                    drum.stopPattern();
                    currentAudioManager.isPlaying = false;
                } else {
                    drum.playPattern();
                    currentAudioManager.isPlaying = true;
                }
                updateDockButtons();
                return;
            }
        }
        [60, 64, 67, 72].forEach((midi, index) => {
            setTimeout(() => playRuntimeSynthMidi(midi, 0.7), index * 120);
        });
        currentAudioManager.isPlaying = false;
        updateDockButtons();
        return;
    }

    if (!currentAudioManager || !currentAudioManager.audio) {
        showNotification('⚠️ 请先对准乐器码');
        return;
    }

    const audio = currentAudioManager.audio;

    // 情况1: 音频已准备好，直接播放或暂停
    if (audio.readyState >= 2) { // readyState 2 (HAVE_CURRENT_DATA) 或更高即可
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerHTML = '<span class="emoji">⏸️</span>';
                playBtn.classList.add('playing');
                currentAudioManager.isPlaying = true;
            }).catch(error => {
                console.error('Audio playback failed:', error);
                showNotification('❌ 播放失败，请检查浏览器权限');
            });
        } else {
            audio.pause();
            playBtn.innerHTML = '<span class="emoji">🎵</span>';
            playBtn.classList.remove('playing');
            currentAudioManager.isPlaying = false;
        }
        return;
    }

    // 情况2: 音频未准备好，并且没有在重载中，则启动重载
    if (audio.readyState < 2 && !isAudioReloading) {
        isAudioReloading = true;
        console.log(`Audio not ready for ${currentAudioManager.config.name}. Attempting to reload.`);

        // 复用加载弹窗UI
        const overlay = document.getElementById('loading-overlay');
        const title = document.getElementById('loading-title');
        const progressBar = document.getElementById('progress-bar');
        const text = document.getElementById('loading-text');

        if (!overlay) {
             showNotification('❌ 加载组件出错');
             isAudioReloading = false;
             return;
        }

        title.textContent = `正在加载 ${currentAudioManager.config.name} 音频`;
        progressBar.style.width = '50%'; // 使用一个中间值表示不确定的加载状态
        text.textContent = '网络不佳，正在重新尝试...';
        overlay.classList.remove('hidden');

        // 定义一次性的事件处理器
        const onCanPlay = () => {
            cleanupListeners();
            hideLoadingOverlay(true);
            isAudioReloading = false;
            console.log(`Audio for ${currentAudioManager.config.name} successfully reloaded.`);
            // 加载成功后，再次调用本函数来播放音频
            toggleAudio();
        };

        const onError = () => {
            cleanupListeners();
            hideLoadingOverlay(false);
            isAudioReloading = false;
            console.error(`Failed to reload audio for ${currentAudioManager.config.name}.`);
            showNotification(`❌ ${currentAudioManager.config.name} 音频加载失败`, true);
        };
        
        const cleanupListeners = () => {
            audio.removeEventListener('canplaythrough', onCanPlay);
            audio.removeEventListener('error', onError);
        };

        // 绑定事件
        audio.addEventListener('canplaythrough', onCanPlay, { once: true });
        audio.addEventListener('error', onError, { once: true });

        // 触发重新加载
        audio.load();
    } else if (isAudioReloading) {
        // 情况3: 如果正在重载中，提示用户等待
        showNotification('🔄 音频正在加载中，请稍候...');
    }
}

function showInfo() {
    if (!currentAudioManager) {
        showNotification('⚠️ 请先对准乐器码');
        return;
    }
    const markdownText = markdownCache[currentAudioManager.markerId];
    if (typeof markdownText === 'string') {
        loadMarkdownContent(currentAudioManager.config.name, markdownText, currentAudioManager.config.markdown);
    } else {
        showNotification('🔄 介绍内容加载中...');
    }
}

function resetModel() {
    if (!currentAudioManager) {
        showNotification('⚠️ 请先对准一个乐器码');
        return;
    }
    const modelId = `model${currentAudioManager.markerId.replace('marker', '')}`;
    const modelEl = document.getElementById(modelId);
    if (modelEl && modelEl.components['touch-handler']) {
        modelEl.components['touch-handler'].reset();
        showNotification('🔄 模型已复位');
    } else {
        console.error('复位失败：无法找到模型或touch-handler组件', modelId);
    }
}

function toggleModelGestureMode() {
    if (!currentAudioManager) {
        showNotification('⚠️ 请先对准一个乐器码');
        return;
    }
    modelGestureMode = modelGestureMode === 'interact' ? 'rotate' : 'interact';
    runtimeControlPointerActive = false;
    const modeName = modelGestureMode === 'interact' ? '控件交互' : '整机旋转';
    showNotification(`已切换到${modeName}模式`);
    updateDockButtons();
}

function loadMarkdownContent(title, markdownText, markdownPath) {
    if (typeof marked === 'undefined') {
        console.error('marked.js 未加载');
        showNotification('❌ Markdown渲染器未加载');
        return;
    }
    const htmlContent = marked.parse(markdownText);
    showInfoPanel(`📖 ${title}`, `<div class="markdown-content">${htmlContent}</div>`);

    const infoPanel = document.getElementById('info-panel');
    if (!infoPanel) return;
    const contentDiv = infoPanel.querySelector('.info-content');
    const markdownDir = markdownPath.substring(0, markdownPath.lastIndexOf('/') + 1);
    const images = contentDiv.querySelectorAll('.markdown-content img');
    
    images.forEach(img => {
        const originalSrc = img.getAttribute('src');
        if (originalSrc && originalSrc.startsWith('./')) {
            const newSrc = markdownDir + originalSrc.substring(2);
            console.log(`Fixing image path: ${originalSrc} -> ${newSrc}`);
            img.src = newSrc;
            img.onerror = () => {
                console.error(`Failed to load image: ${img.src}`);
                img.alt = `图片加载失败: ${originalSrc}`;
                const errorText = document.createElement('p');
                errorText.textContent = `[图片: ${originalSrc} 加载失败]`;
                errorText.style.color = 'red';
                img.parentNode.replaceChild(errorText, img);
            };
        }
    });
}

function showInfoPanel(title, content) {
    let infoPanel = document.getElementById('info-panel');
    if (!infoPanel) return;
    infoPanel.querySelector('.info-title').innerHTML = title;
    infoPanel.querySelector('.info-content').innerHTML = content;
    infoPanel.classList.add('active');
}

function hideInfoPanel() {
    const infoPanel = document.getElementById('info-panel');
    if (infoPanel) infoPanel.classList.remove('active');
}
