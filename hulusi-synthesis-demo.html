<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>葫芦丝AR交互与声音合成台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #1d2229;
      --panel-2: #252b33;
      --rail: #323944;
      --line: #46505d;
      --ink: #f2f5f8;
      --muted: #a5afba;
      --cyan: #39c3e6;
      --green: #4bd28f;
      --amber: #f2bd58;
      --red: #ff7467;
      --blue: #6aa7ff;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      background: #171b20;
      border-bottom: 1px solid #2c333d;
    }

    .title {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .title strong {
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title span {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .segmented {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 7px;
      overflow: hidden;
      background: #12161b;
    }

    .segmented button,
    .command {
      height: 34px;
      border: 0;
      padding: 0 11px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
    }

    .segmented button {
      border-right: 1px solid var(--line);
      color: var(--muted);
    }

    .segmented button:last-child {
      border-right: 0;
    }

    .segmented button.active {
      background: var(--cyan);
      color: #071117;
      font-weight: 800;
    }

    .command {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #20262d;
    }

    .command.primary {
      background: var(--green);
      border-color: var(--green);
      color: #07120c;
      font-weight: 800;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(480px, 0.9fr) minmax(560px, 1.1fr);
      gap: 12px;
      padding: 12px;
    }

    .stage-card,
    .synth-card {
      min-height: 0;
      border: 1px solid #343c47;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage-card {
      display: grid;
      grid-template-rows: 42px 1fr 86px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      background: #222831;
      border-bottom: 1px solid #343c47;
      font-size: 13px;
      color: var(--muted);
    }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .status-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px var(--green);
    }

    .stage-frame {
      position: relative;
      min-height: 0;
      background:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
        #f6f8fb;
      background-size: 34px 34px;
    }

    .stage-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f6f8fb;
    }

    .stage-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      background: #171b20;
      border-top: 1px solid #343c47;
    }

    .metric {
      border: 1px solid #343c47;
      border-radius: 7px;
      background: #20262d;
      padding: 8px;
      min-width: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }

    .metric strong {
      display: block;
      font-size: 17px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .synth-card {
      display: grid;
      grid-template-rows: 42px 1fr;
    }

    .synth-panel {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: 92px 1fr 166px;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 32%),
        var(--panel);
    }

    .signal-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .module-light {
      border: 1px solid #3b444f;
      border-radius: 7px;
      background: #171c22;
      padding: 8px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 4px;
      min-width: 0;
      position: relative;
    }

    .module-light::before {
      content: "";
      position: absolute;
      top: 8px;
      right: 8px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4b5562;
    }

    .module-light.active {
      border-color: rgba(57, 195, 230, 0.75);
      background: #10232c;
    }

    .module-light.active::before {
      background: var(--cyan);
      box-shadow: 0 0 14px var(--cyan);
    }

    .module-light strong {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .module-light span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .module-light em {
      color: var(--cyan);
      font-style: normal;
      font-size: 12px;
      font-weight: 800;
    }

    .hardware-grid {
      min-height: 0;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 10px;
    }

    .hardware-section {
      min-height: 0;
      border: 1px solid #343c47;
      border-radius: 8px;
      background: #20262d;
      padding: 10px;
      overflow: hidden;
    }

    .section-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .knob-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .knob {
      min-width: 0;
      border: 1px solid #3b444f;
      border-radius: 8px;
      background: #161b21;
      padding: 8px;
      display: grid;
      place-items: center;
      gap: 5px;
    }

    .dial {
      width: 58px;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, #2c343e 0 36%, transparent 37%),
        conic-gradient(var(--cyan) calc(var(--value) * 1%), #3a424d 0);
      border: 3px solid #101419;
      box-shadow: inset 0 0 0 1px #53606e, 0 7px 16px rgba(0,0,0,0.32);
      position: relative;
    }

    .dial::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      width: 3px;
      height: 16px;
      transform: translateX(-50%);
      border-radius: 2px;
      background: #eef6f8;
    }

    .knob input {
      width: 100%;
      accent-color: var(--cyan);
    }

    .knob strong {
      font-size: 12px;
    }

    .knob span {
      color: var(--muted);
      font-size: 11px;
    }

    .fader-bank {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      height: 100%;
      min-height: 270px;
    }

    .fader {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
      justify-items: center;
      border: 1px solid #3b444f;
      border-radius: 8px;
      background: #161b21;
      padding: 8px 6px;
      min-width: 0;
    }

    .fader strong {
      font-size: 11px;
      text-align: center;
      min-height: 28px;
      display: flex;
      align-items: center;
    }

    .fader input {
      writing-mode: vertical-rl;
      direction: rtl;
      height: 176px;
      width: 24px;
      accent-color: var(--amber);
    }

    .fader span {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: 0;
    }

    .scope {
      height: 100%;
      border: 1px solid #343c47;
      border-radius: 8px;
      background:
        linear-gradient(rgba(57,195,230,0.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,195,230,0.10) 1px, transparent 1px),
        #081116;
      background-size: 18px 18px;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .scope-line {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 50%;
      height: 3px;
      border-radius: 3px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--green), transparent);
      box-shadow: 0 0 18px rgba(57,195,230,0.5);
      transform: translateY(-50%);
    }

    .scope.active .scope-line {
      animation: wavePulse 420ms ease-in-out 4;
    }

    @keyframes wavePulse {
      0%, 100% { transform: translateY(-50%) scaleY(1); }
      50% { transform: translateY(-50%) scaleY(9); }
    }

    .note-card {
      border: 1px solid #343c47;
      border-radius: 8px;
      background: #20262d;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
    }

    .note-card div {
      border: 1px solid #3b444f;
      border-radius: 7px;
      background: #161b21;
      padding: 7px;
    }

    .note-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .note-card strong {
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .page {
        height: auto;
      }

      .workspace {
        grid-template-columns: 1fr;
        height: auto;
      }

      .stage-card {
        height: 620px;
      }

      .synth-card {
        min-height: 720px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title">
        <strong>葫芦丝AR交互与声音合成台</strong>
        <span>左侧复用平台真实3D模型与音孔碰撞体，右侧展示网页本地合成器链路</span>
      </div>
      <div class="top-actions">
        <div class="segmented" aria-label="筒音选择">
          <button type="button" class="active" data-tube="5">筒音作5</button>
          <button type="button" data-tube="2">筒音作2</button>
          <button type="button" data-tube="1">筒音作1</button>
        </div>
        <button type="button" class="command" id="resetParams">复位参数</button>
        <button type="button" class="command primary" id="playCurrent">播放当前</button>
      </div>
    </header>

    <main class="workspace">
      <section class="stage-card">
        <div class="card-header">
          <strong>真实模型交互区</strong>
          <span class="status-dot">无扫码调试 / 摄像头背景已隐藏</span>
        </div>
        <div class="stage-frame">
          <iframe id="hulusiFrame" src="index.html?embed=hulusi-demo" title="葫芦丝真实模型交互演示"></iframe>
        </div>
        <div class="stage-metrics">
          <div class="metric"><span>触发孔位</span><strong id="metricHole">-</strong></div>
          <div class="metric"><span>输出音高</span><strong id="metricNote">G4</strong></div>
          <div class="metric"><span>频率</span><strong id="metricFreq">392 Hz</strong></div>
          <div class="metric"><span>指法Key</span><strong id="metricKey">1111111</strong></div>
        </div>
      </section>

      <section class="synth-card">
        <div class="card-header">
          <strong>HULUSI WEB SYNTH ENGINE</strong>
          <span>WebAudio 本地运行 / 无采样包</span>
        </div>
        <div class="synth-panel">
          <div class="signal-strip" id="signalStrip"></div>

          <div class="hardware-grid">
            <div class="hardware-section">
              <div class="section-label"><span>Oscillator / Resonator</span><span id="engineReadout">READY</span></div>
              <div class="knob-grid" id="knobGrid"></div>
            </div>

            <div class="hardware-section">
              <div class="section-label"><span>Envelope / Filter Faders</span><span>实时可调</span></div>
              <div class="fader-bank" id="faderBank"></div>
            </div>
          </div>

          <div class="bottom-row">
            <div class="scope" id="scope">
              <div class="section-label"><span>Output Scope</span><span id="scopeText">waiting input</span></div>
              <div class="scope-line"></div>
            </div>
            <div class="note-card">
              <div><span>等效管长</span><strong id="metricLength">1.00</strong></div>
              <div><span>簧片能量</span><strong id="metricReed">0.36</strong></div>
              <div><span>气声</span><strong id="metricBreath">0.019</strong></div>
              <div><span>主管共鸣</span><strong id="metricPipe">862 Hz</strong></div>
              <div><span>葫芦腔</span><strong id="metricGourd">365 Hz</strong></div>
              <div><span>输出</span><strong id="metricOut">0.58</strong></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const signalModules = [
      ["hit", "触摸", "音孔碰撞体"],
      ["fingering", "指法", "开闭孔/管长"],
      ["reed", "簧片", "谐波+整形"],
      ["noise", "气声", "吹气/吐音"],
      ["resonator", "共鸣", "葫芦腔/主管"],
      ["output", "输出", "包络/音量"]
    ];

    const controls = [
      { id: "reedSustain", label: "REED", kind: "knob", value: 1, min: 0.2, max: 1.8 },
      { id: "pipeFrequency", label: "PIPE FREQ", kind: "knob", value: 1, min: 0.65, max: 1.45 },
      { id: "gourdFrequency", label: "GOURD", kind: "knob", value: 1, min: 0.65, max: 1.45 },
      { id: "nasalFrequency", label: "NASAL", kind: "knob", value: 1, min: 0.65, max: 1.45 },
      { id: "vibratoDepth", label: "VIB", kind: "knob", value: 1, min: 0, max: 1.8 },
      { id: "pressureDepth", label: "PRESS", kind: "knob", value: 1, min: 0, max: 2.2 },
      { id: "breathSustain", label: "BREATH", kind: "fader", value: 1, min: 0, max: 2.2 },
      { id: "chiffFrequency", label: "CHIFF", kind: "fader", value: 1, min: 0.55, max: 1.55 },
      { id: "pipeQ", label: "PIPE Q", kind: "fader", value: 1, min: 0.35, max: 1.8 },
      { id: "pipeGain", label: "PIPE GAIN", kind: "fader", value: 1, min: 0.35, max: 1.8 },
      { id: "airLowpassFrequency", label: "AIR LPF", kind: "fader", value: 1, min: 0.45, max: 1.45 },
      { id: "outputSustain", label: "OUTPUT", kind: "fader", value: 1, min: 0.2, max: 1.6 }
    ];

    const state = {
      hole: "-",
      note: "G4",
      freq: 392,
      key: "1111111",
      acoustic: {
        lengthRatio: 1,
        reedSustain: 0.36,
        breathSustain: 0.019,
        pipeFrequency: 862,
        gourdFrequency: 365,
        outputSustain: 0.58
      }
    };

    function fmt(value, digits = 2) {
      if (!Number.isFinite(value)) return "-";
      return Math.abs(value) >= 100 ? String(Math.round(value)) : value.toFixed(digits);
    }

    function renderModules() {
      document.getElementById("signalStrip").innerHTML = signalModules.map(([id, name, desc]) => `
        <div class="module-light" data-module="${id}">
          <strong>${name}</strong>
          <span>${desc}</span>
          <em data-module-value="${id}">-</em>
        </div>
      `).join("");
    }

    function renderControls() {
      const knobGrid = document.getElementById("knobGrid");
      const faderBank = document.getElementById("faderBank");
      knobGrid.innerHTML = "";
      faderBank.innerHTML = "";
      controls.forEach((control) => {
        const percent = ((control.value - control.min) / (control.max - control.min)) * 100;
        if (control.kind === "knob") {
          const node = document.createElement("div");
          node.className = "knob";
          node.innerHTML = `
            <div class="dial" style="--value:${percent}"></div>
            <strong>${control.label}</strong>
            <span data-control-value="${control.id}">x${control.value.toFixed(2)}</span>
            <input type="range" min="${control.min}" max="${control.max}" step="0.01" value="${control.value}" data-control="${control.id}">
          `;
          knobGrid.appendChild(node);
        } else {
          const node = document.createElement("div");
          node.className = "fader";
          node.innerHTML = `
            <strong>${control.label}</strong>
            <input type="range" min="${control.min}" max="${control.max}" step="0.01" value="${control.value}" data-control="${control.id}">
            <span data-control-value="${control.id}">x${control.value.toFixed(2)}</span>
          `;
          faderBank.appendChild(node);
        }
      });
      document.querySelectorAll("[data-control]").forEach((input) => {
        input.addEventListener("input", () => {
          const control = controls.find((item) => item.id === input.dataset.control);
          control.value = Number(input.value);
          const percent = ((control.value - control.min) / (control.max - control.min)) * 100;
          const valueEl = document.querySelector(`[data-control-value="${control.id}"]`);
          if (valueEl) valueEl.textContent = `x${control.value.toFixed(2)}`;
          const dial = input.closest(".knob")?.querySelector(".dial");
          if (dial) dial.style.setProperty("--value", percent);
          sendFrameCommand("params", { params: currentParamMultipliers() });
          pulse(["reed", "noise", "resonator", "output"]);
          updatePanel();
        });
      });
    }

    function pulse(ids) {
      document.querySelectorAll(".module-light").forEach((node) => node.classList.remove("active"));
      ids.forEach((id, index) => {
        window.setTimeout(() => document.querySelector(`[data-module="${id}"]`)?.classList.add("active"), index * 60);
      });
      const scope = document.getElementById("scope");
      scope.classList.remove("active");
      void scope.offsetWidth;
      scope.classList.add("active");
    }

    function currentParamMultipliers() {
      return Object.fromEntries(controls.map((control) => [control.id, control.value]));
    }

    function updatePanel() {
      const acoustic = state.acoustic || {};
      document.getElementById("metricHole").textContent = state.hole;
      document.getElementById("metricNote").textContent = state.note;
      document.getElementById("metricFreq").textContent = `${Math.round(state.freq)} Hz`;
      document.getElementById("metricKey").textContent = state.key;
      document.getElementById("metricLength").textContent = fmt(acoustic.lengthRatio ?? acoustic.effectiveLengthRatio ?? 1, 2);
      document.getElementById("metricReed").textContent = fmt(acoustic.reedSustain ?? 0.36, 2);
      document.getElementById("metricBreath").textContent = fmt(acoustic.breathSustain ?? 0.019, 3);
      document.getElementById("metricPipe").textContent = `${fmt(acoustic.pipeFrequency ?? 862, 0)} Hz`;
      document.getElementById("metricGourd").textContent = `${fmt(acoustic.gourdFrequency ?? 365, 0)} Hz`;
      document.getElementById("metricOut").textContent = fmt(acoustic.outputSustain ?? 0.58, 2);
      const values = {
        hit: state.hole,
        fingering: `L=${fmt(acoustic.lengthRatio ?? acoustic.effectiveLengthRatio ?? 1, 2)}`,
        reed: fmt(acoustic.reedSustain ?? 0.36, 2),
        noise: fmt(acoustic.breathSustain ?? 0.019, 3),
        resonator: `${fmt(acoustic.pipeFrequency ?? 862, 0)}Hz`,
        output: fmt(acoustic.outputSustain ?? 0.58, 2)
      };
      Object.entries(values).forEach(([id, value]) => {
        const el = document.querySelector(`[data-module-value="${id}"]`);
        if (el) el.textContent = value;
      });
      document.getElementById("scopeText").textContent = `${state.note} / ${Math.round(state.freq)}Hz`;
      document.getElementById("engineReadout").textContent = `${state.key} / ${state.note}`;
    }

    function resetControls() {
      controls.forEach((control) => control.value = 1);
      renderControls();
      sendFrameCommand("params", { params: currentParamMultipliers() });
      updatePanel();
      pulse(["reed", "noise", "resonator", "output"]);
    }

    function sendFrameCommand(command, payload = {}) {
      const frame = document.getElementById("hulusiFrame");
      frame.contentWindow?.postMessage({ type: "hulusi-demo-command", command, ...payload }, "*");
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== "hulusi-demo-state") return;
      state.hole = data.fingering?.displayNumber ? `孔${data.fingering.displayNumber}` : "真实指法";
      state.note = `${data.fingering?.label || ""} ${data.fingering?.note || ""}`.trim();
      state.freq = data.fingering?.frequency || state.freq;
      state.key = data.fingering?.key || state.key;
      state.acoustic = data.acoustic || state.acoustic;
      updatePanel();
      pulse(["hit", "fingering", "reed", "noise", "resonator", "output"]);
    });

    document.querySelectorAll("[data-tube]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-tube]").forEach((item) => item.classList.toggle("active", item === button));
        sendFrameCommand("tube", { value: button.dataset.tube });
      });
    });

    document.getElementById("resetParams").addEventListener("click", resetControls);
    document.getElementById("playCurrent").addEventListener("click", () => {
      sendFrameCommand("play-current");
      pulse(["hit", "fingering", "reed", "noise", "resonator", "output"]);
    });

    renderModules();
    renderControls();
    updatePanel();
    document.getElementById("hulusiFrame").addEventListener("load", () => {
      window.setTimeout(() => sendFrameCommand("params", { params: currentParamMultipliers() }), 250);
    });
  </script>
</body>
</html>
